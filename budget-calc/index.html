<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💰 Budget Calculator</title>
<meta name="description" content="Beautiful budget calculator with expense tracking, charts, and savings goals.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
body{font-family:'Space Grotesk',sans-serif;min-height:100vh;background:#0a0a14;color:#fff;overflow-x:hidden;padding:1.5rem}
.container{max-width:600px;margin:0 auto}
h1{font-size:clamp(1.8rem,5vw,2.5rem);font-weight:700;text-align:center;background:linear-gradient(135deg,#22c55e,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:1.5rem}
.balance-card{padding:2rem;border-radius:20px;background:linear-gradient(135deg,#12271a,#0a1a14);border:1px solid #22c55e22;text-align:center;margin-bottom:1.5rem}
.balance-label{font-size:.8rem;color:#22c55e88;letter-spacing:2px;text-transform:uppercase}
.balance-amount{font-size:3rem;font-weight:700;color:#22c55e;margin:.5rem 0}
.balance-row{display:flex;justify-content:center;gap:2rem}
.income-box,.expense-box{text-align:center}
.income-box .amount{color:#22c55e;font-size:1.2rem;font-weight:700}
.expense-box .amount{color:#ef4444;font-size:1.2rem;font-weight:700}
.label{font-size:.7rem;color:#666;text-transform:uppercase;letter-spacing:1px}
.add-section{padding:1.5rem;border-radius:16px;background:#111827;border:1px solid #1e293b;margin-bottom:1.5rem}
.add-title{font-size:.8rem;color:#666;letter-spacing:2px;margin-bottom:1rem;text-transform:uppercase}
.input-row{display:flex;gap:.5rem;margin-bottom:.8rem}
.input-row input,.input-row select{flex:1;padding:.8rem;border-radius:10px;border:2px solid #1e293b;background:#0a0a14;color:#fff;font-family:'Space Grotesk',sans-serif;outline:none;transition:all .3s}
.input-row input:focus{border-color:#22c55e}
.type-toggle{display:flex;gap:.5rem;margin-bottom:.8rem}
.type-btn{flex:1;padding:.6rem;border-radius:10px;border:2px solid #1e293b;background:transparent;color:#666;cursor:pointer;font-family:'Space Grotesk',sans-serif;transition:all .3s;text-align:center}
.type-btn.income.active{border-color:#22c55e;color:#22c55e;background:#22c55e11}
.type-btn.expense.active{border-color:#ef4444;color:#ef4444;background:#ef444411}
.add-btn{width:100%;padding:.8rem;border-radius:10px;border:none;background:linear-gradient(135deg,#22c55e,#06b6d4);color:#fff;font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all .3s}
.add-btn:hover{transform:translateY(-2px);box-shadow:0 5px 20px #22c55e44}
.chart-area{padding:1.5rem;border-radius:16px;background:#111827;border:1px solid #1e293b;margin-bottom:1.5rem}
.chart-title{font-size:.8rem;color:#666;letter-spacing:2px;margin-bottom:1rem;text-transform:uppercase}
.chart-bars{display:flex;align-items:flex-end;gap:.5rem;height:120px;padding:.5rem 0}
.chart-bar{flex:1;border-radius:6px 6px 0 0;transition:height .5s;min-width:20px;position:relative;cursor:pointer}
.chart-bar:hover::after{content:attr(data-label);position:absolute;top:-25px;left:50%;transform:translateX(-50%);font-size:.7rem;color:#aaa;white-space:nowrap}
.transactions{padding:1.5rem;border-radius:16px;background:#111827;border:1px solid #1e293b}
.tx-title{font-size:.8rem;color:#666;letter-spacing:2px;margin-bottom:1rem;text-transform:uppercase}
.tx-list{max-height:250px;overflow-y:auto}
.tx-item{display:flex;justify-content:space-between;align-items:center;padding:.8rem;border-radius:10px;margin-bottom:.5rem;background:#0a0a14;border:1px solid #1e293b}
.tx-name{font-size:.95rem}
.tx-cat{font-size:.7rem;color:#666}
.tx-amount{font-weight:700;font-size:1rem}
.tx-amount.positive{color:#22c55e}
.tx-amount.negative{color:#ef4444}
.tx-delete{background:none;border:none;color:#ef444444;cursor:pointer;font-size:1rem;padding:.2rem .5rem;transition:color .3s}
.tx-delete:hover{color:#ef4444}
.music-toggle{position:fixed;top:1rem;right:1rem;z-index:100;background:#111827;border:2px solid #22c55e44;border-radius:50%;width:45px;height:45px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.2rem;transition:all .3s}
.music-toggle:hover{border-color:#22c55e;transform:scale(1.1)}
</style>
</head>
<body>
<div class="music-toggle" onclick="toggleMusic()">🔊</div>
<div class="container">
  <h1>💰 Budget Tracker</h1>
  <div class="balance-card">
    <div class="balance-label">Current Balance</div>
    <div class="balance-amount" id="balance">₹0</div>
    <div class="balance-row">
      <div class="income-box"><div class="label">Income</div><div class="amount" id="totalIncome">₹0</div></div>
      <div class="expense-box"><div class="label">Expenses</div><div class="amount" id="totalExpense">₹0</div></div>
    </div>
  </div>

  <div class="add-section">
    <div class="add-title">Add Transaction</div>
    <div class="type-toggle">
      <span class="type-btn expense active" onclick="setType('expense',this)">💸 Expense</span>
      <span class="type-btn income" onclick="setType('income',this)">💰 Income</span>
    </div>
    <div class="input-row">
      <input type="text" id="txName" placeholder="Description">
      <input type="number" id="txAmount" placeholder="Amount (₹)">
    </div>
    <div class="input-row">
      <select id="txCategory">
        <option>🍔 Food</option><option>🏠 Rent</option><option>🚗 Transport</option>
        <option>📱 Phone</option><option>🎮 Entertainment</option><option>💼 Work</option>
        <option>📚 Education</option><option>💊 Health</option><option>🎁 Other</option>
      </select>
    </div>
    <button class="add-btn" onclick="addTransaction()">+ Add Transaction</button>
  </div>

  <div class="chart-area">
    <div class="chart-title">Spending by Category</div>
    <div class="chart-bars" id="chartBars"></div>
  </div>

  <div class="transactions">
    <div class="tx-title">Recent Transactions</div>
    <div class="tx-list" id="txList"></div>
  </div>
</div>

<script>
let txType='expense';
let transactions=JSON.parse(localStorage.getItem('budgetTx')||'[]');

function setType(type,el){
  txType=type;
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}

function addTransaction(){
  const name=document.getElementById('txName').value.trim();
  const amount=parseFloat(document.getElementById('txAmount').value);
  const cat=document.getElementById('txCategory').value;
  if(!name||!amount)return;

  transactions.unshift({name,amount:txType==='income'?amount:-amount,category:cat,date:new Date().toLocaleDateString()});
  localStorage.setItem('budgetTx',JSON.stringify(transactions));
  document.getElementById('txName').value='';
  document.getElementById('txAmount').value='';
  render();
}

function deleteTransaction(i){
  transactions.splice(i,1);
  localStorage.setItem('budgetTx',JSON.stringify(transactions));
  render();
}

function render(){
  const income=transactions.filter(t=>t.amount>0).reduce((s,t)=>s+t.amount,0);
  const expense=transactions.filter(t=>t.amount<0).reduce((s,t)=>s+Math.abs(t.amount),0);
  const balance=income-expense;

  document.getElementById('balance').textContent='₹'+balance.toLocaleString();
  document.getElementById('balance').style.color=balance>=0?'#22c55e':'#ef4444';
  document.getElementById('totalIncome').textContent='₹'+income.toLocaleString();
  document.getElementById('totalExpense').textContent='₹'+expense.toLocaleString();

  // Transaction list
  const list=document.getElementById('txList');
  list.innerHTML='';
  transactions.slice(0,20).forEach((t,i)=>{
    const el=document.createElement('div');
    el.className='tx-item';
    el.innerHTML=`
      <div><div class="tx-name">${t.name}</div><div class="tx-cat">${t.category} • ${t.date}</div></div>
      <div style="display:flex;align-items:center;gap:.5rem">
        <div class="tx-amount ${t.amount>0?'positive':'negative'}">${t.amount>0?'+':''}₹${Math.abs(t.amount).toLocaleString()}</div>
        <button class="tx-delete" onclick="deleteTransaction(${i})">×</button>
      </div>`;
    list.appendChild(el);
  });

  // Chart
  const cats={};
  transactions.filter(t=>t.amount<0).forEach(t=>{
    const cat=t.category.split(' ')[1]||t.category;
    cats[cat]=(cats[cat]||0)+Math.abs(t.amount);
  });
  const maxVal=Math.max(...Object.values(cats),1);
  const colors=['#22c55e','#06b6d4','#a78bfa','#fbbf24','#ec4899','#ef4444','#f97316','#14b8a6','#64748b'];
  const chartDiv=document.getElementById('chartBars');
  chartDiv.innerHTML='';
  Object.entries(cats).forEach(([cat,val],i)=>{
    const bar=document.createElement('div');
    bar.className='chart-bar';
    bar.style.height=(val/maxVal*100)+'%';
    bar.style.background=colors[i%colors.length];
    bar.setAttribute('data-label',`${cat}: ₹${val}`);
    chartDiv.appendChild(bar);
  });
}
render();

let audioCtx,musicOn=false;
function toggleMusic(){
  const btn=document.querySelector('.music-toggle');
  if(!musicOn){audioCtx=new(window.AudioContext||window.webkitAudioContext)();playLoop();musicOn=true;btn.textContent='🔊'}
  else{audioCtx.close();audioCtx=null;musicOn=false;btn.textContent='🔇'}
}
function playLoop(){
  if(!audioCtx)return;
  const now=audioCtx.currentTime;
  [196,247,294,330,294,247].forEach((f,i)=>{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='triangle';o.frequency.value=f;
    g.gain.setValueAtTime(0,now+i*.8);g.gain.linearRampToValueAtTime(.03,now+i*.8+.1);g.gain.linearRampToValueAtTime(0,now+i*.8+.7);
    o.connect(g);g.connect(audioCtx.destination);o.start(now+i*.8);o.stop(now+i*.8+.8);
  });
  setTimeout(playLoop,4800);
}
document.addEventListener('click',function s(){if(!musicOn)toggleMusic();document.removeEventListener('click',s)},{once:true});
</script>
</body>
</html>
