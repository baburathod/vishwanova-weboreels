<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ Particle Name Art</title>
<meta name="description" content="Type your name and watch it transform into a stunning particle animation.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap');
body{font-family:'Outfit',sans-serif;background:#000;overflow:hidden;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh}
canvas{position:fixed;top:0;left:0}
.input-area{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:.5rem;max-width:500px;width:90%}
.input-area input{flex:1;padding:1rem 1.5rem;border-radius:16px;border:2px solid #a78bfa33;background:rgba(0,0,0,0.7);color:#fff;font-family:'Outfit',sans-serif;font-size:1.1rem;outline:none;backdrop-filter:blur(10px);transition:all .3s}
.input-area input:focus{border-color:#a78bfa}
.input-area input::placeholder{color:#555}
.go-btn{padding:1rem 1.5rem;border-radius:16px;border:none;background:linear-gradient(135deg,#a78bfa,#ec4899);color:#fff;font-family:'Outfit',sans-serif;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s}
.go-btn:hover{transform:translateY(-2px);box-shadow:0 5px 20px #a78bfa44}
.hint{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:5;font-size:1.3rem;color:#555;pointer-events:none;text-align:center;letter-spacing:3px;transition:opacity 1s}
.music-toggle{position:fixed;top:1.5rem;right:1.5rem;z-index:100;background:rgba(0,0,0,0.5);border:2px solid #a78bfa44;border-radius:50%;width:45px;height:45px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.2rem;transition:all .3s;backdrop-filter:blur(5px)}
.music-toggle:hover{border-color:#a78bfa;transform:scale(1.1)}
.color-btns{position:fixed;top:1.5rem;left:1.5rem;z-index:10;display:flex;gap:.3rem}
.color-btn{width:30px;height:30px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:all .3s}
.color-btn:hover{transform:scale(1.2)}
.color-btn.active{border-color:#fff}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div class="hint" id="hint">Type your name below ↓</div>
<div class="color-btns" id="colorBtns"></div>
<div class="input-area">
  <input type="text" id="nameInput" placeholder="Type your name..." maxlength="15" autofocus>
  <button class="go-btn" onclick="renderName()">✨ Go!</button>
</div>
<div class="music-toggle" onclick="toggleMusic()">🔊</div>

<script>
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}
resize();window.addEventListener('resize',resize);

const colorSchemes=[
  {name:'Purple',colors:['#a78bfa','#c084fc','#818cf8','#e879f9'],bg:'#a78bfa'},
  {name:'Cyan',colors:['#06b6d4','#22d3ee','#67e8f9','#0891b2'],bg:'#06b6d4'},
  {name:'Rose',colors:['#ec4899','#f472b6','#fb7185','#e11d48'],bg:'#ec4899'},
  {name:'Green',colors:['#22c55e','#4ade80','#86efac','#16a34a'],bg:'#22c55e'},
  {name:'Gold',colors:['#fbbf24','#f59e0b','#fcd34d','#d97706'],bg:'#fbbf24'},
];
let currentScheme=0;

// Render color buttons
const colorBtnsDiv=document.getElementById('colorBtns');
colorSchemes.forEach((s,i)=>{
  const btn=document.createElement('div');
  btn.className='color-btn'+(i===0?' active':'');
  btn.style.background=s.bg;
  btn.onclick=()=>{document.querySelectorAll('.color-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');currentScheme=i;if(particles.length)renderName()};
  colorBtnsDiv.appendChild(btn);
});

let particles=[];
let mouse={x:W/2,y:H/2};

canvas.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY});
canvas.addEventListener('touchmove',e=>{mouse.x=e.touches[0].clientX;mouse.y=e.touches[0].clientY;e.preventDefault()});

class Particle{
  constructor(x,y){
    this.x=Math.random()*W;
    this.y=Math.random()*H;
    this.targetX=x;
    this.targetY=y;
    this.size=Math.random()*3+1;
    this.color=colorSchemes[currentScheme].colors[Math.floor(Math.random()*colorSchemes[currentScheme].colors.length)];
    this.speed=Math.random()*0.05+0.02;
    this.angle=Math.random()*Math.PI*2;
  }
  update(){
    const dx=mouse.x-this.x;
    const dy=mouse.y-this.y;
    const dist=Math.sqrt(dx*dx+dy*dy);

    if(dist<100){
      this.x-=dx/dist*5;
      this.y-=dy/dist*5;
    } else {
      this.x+=(this.targetX-this.x)*this.speed;
      this.y+=(this.targetY-this.y)*this.speed;
    }
    this.angle+=0.02;
    this.x+=Math.sin(this.angle)*0.3;
    this.y+=Math.cos(this.angle)*0.3;
  }
  draw(){
    ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fillStyle=this.color;ctx.fill();
    // Glow
    ctx.beginPath();ctx.arc(this.x,this.y,this.size*3,0,Math.PI*2);
    const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.size*3);
    g.addColorStop(0,this.color+'33');g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.fill();
  }
}

function renderName(){
  const name=document.getElementById('nameInput').value.trim()||'HELLO';
  document.getElementById('hint').style.opacity='0';

  // Get text pixels
  const offCanvas=document.createElement('canvas');
  const offCtx=offCanvas.getContext('2d');
  const fontSize=Math.min(W/name.length*1.2,H*0.4);
  offCanvas.width=W;offCanvas.height=H;
  offCtx.font=`900 ${fontSize}px Outfit`;
  offCtx.textAlign='center';offCtx.textBaseline='middle';
  offCtx.fillStyle='#fff';
  offCtx.fillText(name.toUpperCase(),W/2,H/2);

  const imageData=offCtx.getImageData(0,0,W,H).data;
  const points=[];
  const gap=4;
  for(let y=0;y<H;y+=gap){
    for(let x=0;x<W;x+=gap){
      const i=(y*W+x)*4;
      if(imageData[i+3]>128){
        points.push({x,y});
      }
    }
  }

  // Limit particles
  const maxParticles=Math.min(points.length,2000);
  const step=Math.max(1,Math.floor(points.length/maxParticles));
  particles=[];
  for(let i=0;i<points.length;i+=step){
    particles.push(new Particle(points[i].x,points[i].y));
  }
}

function animate(){
  ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fillRect(0,0,W,H);
  particles.forEach(p=>{p.update();p.draw()});
  requestAnimationFrame(animate);
}
animate();

document.getElementById('nameInput').addEventListener('keydown',e=>{if(e.key==='Enter')renderName()});

let audioCtx,musicOn=false;
function toggleMusic(){
  const btn=document.querySelector('.music-toggle');
  if(!musicOn){audioCtx=new(window.AudioContext||window.webkitAudioContext)();playMagic();musicOn=true;btn.textContent='🔊'}
  else{audioCtx.close();audioCtx=null;musicOn=false;btn.textContent='🔇'}
}
function playMagic(){
  if(!audioCtx)return;
  const now=audioCtx.currentTime;
  [261.63,329.63,392,523.25,440,349.23].forEach((f,i)=>{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='sine';o.frequency.value=f;
    g.gain.setValueAtTime(0,now+i*1.2);g.gain.linearRampToValueAtTime(.04,now+i*1.2+.2);g.gain.linearRampToValueAtTime(0,now+i*1.2+1.1);
    o.connect(g);g.connect(audioCtx.destination);o.start(now+i*1.2);o.stop(now+i*1.2+1.2);
  });
  setTimeout(playMagic,7200);
}
document.addEventListener('click',function s(){if(!musicOn)toggleMusic();document.removeEventListener('click',s)},{once:true});
</script>
</body>
</html>
