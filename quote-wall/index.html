<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💬 Quote Wall</title>
<meta name="description" content="A beautiful interactive wall of wisdom. Add your own quotes and watch them float.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,400&family=Inter:wght@300;400;500&display=swap');
body{font-family:'Inter',sans-serif;min-height:100vh;background:#0a0a14;color:#fff;overflow-x:hidden}
.header{text-align:center;padding:3rem 2rem 1rem;position:relative;z-index:2}
h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,7vw,4rem);font-weight:600;background:linear-gradient(135deg,#fbbf24,#f59e0b,#d97706);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{color:#fbbf2444;letter-spacing:3px;font-size:.85rem;margin-top:.5rem;text-transform:uppercase}
.wall{position:relative;min-height:70vh;padding:2rem;display:flex;flex-wrap:wrap;gap:1rem;justify-content:center;align-items:flex-start;z-index:1}
.quote-card{padding:1.5rem;border-radius:16px;max-width:300px;min-width:200px;background:rgba(255,255,255,0.03);border:1px solid rgba(251,191,36,0.1);backdrop-filter:blur(5px);transition:all .5s;cursor:pointer;animation:floatIn .8s ease both}
@keyframes floatIn{from{opacity:0;transform:translateY(30px) rotate(-2deg)}to{opacity:1;transform:translateY(0) rotate(0)}}
.quote-card:hover{transform:translateY(-5px) rotate(1deg);border-color:#fbbf2444;box-shadow:0 10px 40px #fbbf2422}
.quote-text{font-family:'Playfair Display',serif;font-size:1.1rem;font-style:italic;color:#e8e0d4;line-height:1.8;margin-bottom:.8rem}
.quote-author{font-size:.85rem;color:#fbbf24aa;font-weight:500}
.quote-likes{margin-top:.5rem;font-size:.85rem;color:#666;cursor:pointer;transition:color .3s}
.quote-likes:hover{color:#fbbf24}
.add-section{position:fixed;bottom:0;left:0;right:0;padding:1.5rem 2rem;background:linear-gradient(transparent,#0a0a14 30%);z-index:10;display:flex;gap:.8rem;max-width:700px;margin:0 auto}
.add-section input{flex:1;padding:.9rem 1.2rem;border-radius:12px;border:2px solid #fbbf2433;background:#12121e;color:#fff;font-family:'Inter',sans-serif;font-size:.95rem;outline:none}
.add-section input:focus{border-color:#fbbf24}
.add-btn{padding:.9rem 1.5rem;border-radius:12px;border:none;background:linear-gradient(135deg,#fbbf24,#d97706);color:#000;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;font-size:.95rem;transition:all .3s}
.add-btn:hover{transform:translateY(-2px);box-shadow:0 5px 20px #fbbf2444}
.music-toggle{position:fixed;top:1.5rem;right:1.5rem;z-index:100;background:#12121e;border:2px solid #fbbf2444;border-radius:50%;width:50px;height:50px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.3rem;transition:all .3s}
.music-toggle:hover{border-color:#fbbf24;transform:scale(1.1)}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="music-toggle" onclick="toggleMusic()">🔊</div>
<div class="header">
  <h1>Quote Wall</h1>
  <p class="sub">Wisdom that floats</p>
</div>
<div class="wall" id="wall"></div>
<div class="add-section">
  <input type="text" id="quoteInput" placeholder="Add your wisdom...">
  <input type="text" id="authorInput" placeholder="— Author" style="max-width:150px">
  <button class="add-btn" onclick="addQuote()">✨ Add</button>
</div>

<script>
const canvas=document.getElementById('bg'),ctx=canvas.getContext('2d');
function resize(){canvas.width=innerWidth;canvas.height=innerHeight}
resize();window.addEventListener('resize',resize);
let sparkles=[];
for(let i=0;i<30;i++) sparkles.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*2+.5,speed:Math.random()*.2+.05,a:Math.random()*Math.PI*2});
function draw(){
  ctx.fillStyle='rgba(10,10,20,0.03)';ctx.fillRect(0,0,canvas.width,canvas.height);
  sparkles.forEach(s=>{s.a+=.01;s.y-=s.speed;if(s.y<0){s.y=canvas.height;s.x=Math.random()*canvas.width}
    ctx.beginPath();ctx.arc(s.x+Math.sin(s.a)*20,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(251,191,36,${.2+Math.sin(s.a)*.15})`;ctx.fill()});
  requestAnimationFrame(draw);
}
draw();

const defaultQuotes=[
  {text:"The only way to do great work is to love what you do.",author:"Steve Jobs",likes:42},
  {text:"In the middle of difficulty lies opportunity.",author:"Albert Einstein",likes:38},
  {text:"Be yourself; everyone else is already taken.",author:"Oscar Wilde",likes:55},
  {text:"The future belongs to those who believe in the beauty of their dreams.",author:"Eleanor Roosevelt",likes:29},
  {text:"It does not matter how slowly you go as long as you do not stop.",author:"Confucius",likes:33},
  {text:"Darkness cannot drive out darkness; only light can do that.",author:"Martin Luther King Jr.",likes:47},
  {text:"The best time to plant a tree was 20 years ago. The second best time is now.",author:"Chinese Proverb",likes:51},
  {text:"Life is what happens when you're busy making other plans.",author:"John Lennon",likes:36},
  {text:"Not all those who wander are lost.",author:"J.R.R. Tolkien",likes:44},
  {text:"The mind is everything. What you think you become.",author:"Buddha",likes:40},
  {text:"Stay hungry, stay foolish.",author:"Steve Jobs",likes:63},
  {text:"Code is poetry.",author:"WordPress",likes:22},
];

let quotes=[...defaultQuotes,...JSON.parse(localStorage.getItem('userQuotes')||'[]')];

function renderQuotes(){
  const wall=document.getElementById('wall');
  wall.innerHTML='';
  quotes.forEach((q,i)=>{
    const card=document.createElement('div');
    card.className='quote-card';
    card.style.animationDelay=`${i*.08}s`;
    card.innerHTML=`
      <div class="quote-text">"${q.text}"</div>
      <div class="quote-author">— ${q.author}</div>
      <div class="quote-likes" onclick="likeQuote(${i})">❤️ ${q.likes}</div>
    `;
    wall.appendChild(card);
  });
}
renderQuotes();

function likeQuote(i){
  quotes[i].likes++;
  renderQuotes();
}

function addQuote(){
  const text=document.getElementById('quoteInput').value.trim();
  const author=document.getElementById('authorInput').value.trim()||'Anonymous';
  if(!text)return;
  const newQ={text,author,likes:0};
  quotes.unshift(newQ);
  const userQuotes=JSON.parse(localStorage.getItem('userQuotes')||'[]');
  userQuotes.unshift(newQ);
  localStorage.setItem('userQuotes',JSON.stringify(userQuotes));
  renderQuotes();
  document.getElementById('quoteInput').value='';
  document.getElementById('authorInput').value='';
}

document.getElementById('quoteInput').addEventListener('keydown',e=>{if(e.key==='Enter')addQuote()});

let audioCtx,musicOn=false;
function toggleMusic(){
  const btn=document.querySelector('.music-toggle');
  if(!musicOn){audioCtx=new(window.AudioContext||window.webkitAudioContext)();playAmbient();musicOn=true;btn.textContent='🔊'}
  else{audioCtx.close();audioCtx=null;musicOn=false;btn.textContent='🔇'}
}
function playAmbient(){
  if(!audioCtx)return;
  const now=audioCtx.currentTime;
  const notes=[196,247,294,330,392,440];
  for(let i=0;i<4;i++){
    const f=notes[Math.floor(Math.random()*notes.length)];
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='sine';o.frequency.value=f;
    g.gain.setValueAtTime(0,now+i*1.5);g.gain.linearRampToValueAtTime(.03,now+i*1.5+.3);g.gain.linearRampToValueAtTime(0,now+i*1.5+1.4);
    o.connect(g);g.connect(audioCtx.destination);o.start(now+i*1.5);o.stop(now+i*1.5+1.5);
  }
  setTimeout(playAmbient,6000);
}
document.addEventListener('click',function s(){if(!musicOn)toggleMusic();document.removeEventListener('click',s)},{once:true});
</script>
</body>
</html>
