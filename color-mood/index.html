<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎨 Color Mood Board</title>
<meta name="description" content="Pick your mood and get a beautiful color palette generated for you. Save and export palettes.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap');
body{font-family:'Outfit',sans-serif;min-height:100vh;background:#0a0a14;color:#fff;display:flex;align-items:center;justify-content:center;overflow-x:hidden}
.container{max-width:600px;width:90%;padding:2rem;text-align:center}
h1{font-size:clamp(2rem,6vw,3.5rem);font-weight:900;background:linear-gradient(135deg,#ec4899,#a78bfa,#06b6d4,#22c55e,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-size:200%;animation:gradientShift 4s ease infinite;margin-bottom:.5rem}
@keyframes gradientShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.sub{color:#666;font-size:.9rem;letter-spacing:3px;margin-bottom:2rem;text-transform:uppercase}
.moods{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;margin-bottom:2rem}
.mood-btn{padding:.6rem 1.2rem;border-radius:99px;border:2px solid transparent;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.9rem;transition:all .3s;background:#111827}
.mood-btn:hover{transform:translateY(-2px)}
.mood-btn.active{transform:translateY(-2px);box-shadow:0 5px 20px rgba(0,0,0,.3)}
.palette-display{display:flex;border-radius:20px;overflow:hidden;height:200px;margin-bottom:1.5rem;cursor:pointer;transition:all .5s}
.palette-color{flex:1;transition:all .5s;display:flex;align-items:flex-end;justify-content:center;padding-bottom:1rem;position:relative}
.palette-color:hover{flex:1.5}
.color-hex{font-size:.75rem;color:#fff;background:rgba(0,0,0,.5);padding:.3rem .6rem;border-radius:6px;opacity:0;transition:opacity .3s}
.palette-color:hover .color-hex{opacity:1}
.actions{display:flex;gap:.5rem;justify-content:center;margin-bottom:2rem;flex-wrap:wrap}
.action-btn{padding:.6rem 1.5rem;border-radius:12px;border:none;font-family:'Outfit',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .3s}
.action-btn.primary{background:linear-gradient(135deg,#a78bfa,#ec4899);color:#fff}
.action-btn.primary:hover{transform:translateY(-2px);box-shadow:0 5px 20px #a78bfa44}
.action-btn.secondary{background:#111827;color:#aaa;border:1.5px solid #333}
.action-btn.secondary:hover{border-color:#a78bfa}
.saved-palettes{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:.5rem}
.saved-mini{height:40px;border-radius:8px;display:flex;overflow:hidden;cursor:pointer;transition:all .3s;border:2px solid transparent}
.saved-mini:hover{transform:scale(1.05);border-color:#a78bfa}
.saved-mini div{flex:1}
.music-toggle{position:fixed;top:1.5rem;right:1.5rem;z-index:100;background:#111827;border:2px solid #a78bfa44;border-radius:50%;width:50px;height:50px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.3rem;transition:all .3s}
.music-toggle:hover{border-color:#a78bfa;transform:scale(1.1)}
</style>
</head>
<body>
<div class="music-toggle" onclick="toggleMusic()">🔊</div>
<div class="container">
  <h1>Color Mood</h1>
  <p class="sub">Your mood → Your palette</p>

  <div class="moods" id="moods"></div>
  <div class="palette-display" id="palette"></div>
  <div class="actions">
    <button class="action-btn primary" onclick="generate()">🎲 New Palette</button>
    <button class="action-btn secondary" onclick="savePalette()">💾 Save</button>
    <button class="action-btn secondary" onclick="copyPalette()">📋 Copy CSS</button>
  </div>
  <div class="saved-palettes" id="saved"></div>
</div>

<script>
const moodData=[
  {name:'😊 Happy',colors:['#fbbf24','#f59e0b','#fb923c','#fcd34d','#fef08a'],border:'#fbbf24'},
  {name:'😌 Calm',colors:['#06b6d4','#22d3ee','#67e8f9','#a5f3fc','#cffafe'],border:'#06b6d4'},
  {name:'💜 Dreamy',colors:['#a78bfa','#c084fc','#e879f9','#d8b4fe','#f0abfc'],border:'#a78bfa'},
  {name:'🔥 Energetic',colors:['#ef4444','#f97316','#fbbf24','#f43f5e','#fb7185'],border:'#ef4444'},
  {name:'🌿 Natural',colors:['#22c55e','#16a34a','#86efac','#4ade80','#bbf7d0'],border:'#22c55e'},
  {name:'🌊 Ocean',colors:['#0ea5e9','#0284c7','#38bdf8','#7dd3fc','#bae6fd'],border:'#0ea5e9'},
  {name:'🌅 Sunset',colors:['#f43f5e','#fb923c','#fbbf24','#e11d48','#f97316'],border:'#f43f5e'},
  {name:'🌙 Night',colors:['#1e1b4b','#312e81','#4338ca','#6366f1','#818cf8'],border:'#6366f1'},
  {name:'🌸 Sakura',colors:['#fda4af','#fb7185','#fecdd3','#ffe4e6','#f9a8d4'],border:'#fb7185'},
];

let currentMood=0,currentPalette=[];
const moodsDiv=document.getElementById('moods');
moodData.forEach((m,i)=>{
  const btn=document.createElement('span');
  btn.className='mood-btn'+(i===0?' active':'');
  btn.textContent=m.name;
  btn.style.borderColor=i===0?m.border:'transparent';
  btn.style.color=m.border;
  btn.onclick=()=>{
    currentMood=i;
    document.querySelectorAll('.mood-btn').forEach(b=>{b.classList.remove('active');b.style.borderColor='transparent'});
    btn.classList.add('active');btn.style.borderColor=m.border;
    generate();
  };
  moodsDiv.appendChild(btn);
});

function hslVariant(hex,range=30){
  // Simple color variation
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  const vary=()=>Math.max(0,Math.min(255,Math.round(Math.random()*range*2-range)));
  return '#'+[r+vary(),g+vary(),b+vary()].map(v=>Math.max(0,Math.min(255,v)).toString(16).padStart(2,'0')).join('');
}

function generate(){
  const base=moodData[currentMood].colors;
  currentPalette=base.map(c=>hslVariant(c,20));
  renderPalette();
}

function renderPalette(){
  const div=document.getElementById('palette');
  div.innerHTML='';
  currentPalette.forEach(c=>{
    const col=document.createElement('div');
    col.className='palette-color';
    col.style.background=c;
    col.innerHTML=`<span class="color-hex">${c}</span>`;
    col.onclick=()=>{navigator.clipboard.writeText(c);col.querySelector('.color-hex').textContent='Copied!';setTimeout(()=>col.querySelector('.color-hex').textContent=c,1000)};
    div.appendChild(col);
  });
}

function savePalette(){
  const saved=JSON.parse(localStorage.getItem('savedPalettes')||'[]');
  saved.unshift([...currentPalette]);
  if(saved.length>20)saved.pop();
  localStorage.setItem('savedPalettes',JSON.stringify(saved));
  renderSaved();
}

function copyPalette(){
  const css=currentPalette.map((c,i)=>`--color-${i+1}: ${c};`).join('\n');
  navigator.clipboard.writeText(`:root {\n${css}\n}`);
}

function renderSaved(){
  const saved=JSON.parse(localStorage.getItem('savedPalettes')||'[]');
  const div=document.getElementById('saved');
  div.innerHTML='';
  saved.forEach(p=>{
    const mini=document.createElement('div');
    mini.className='saved-mini';
    p.forEach(c=>{const d=document.createElement('div');d.style.background=c;mini.appendChild(d)});
    mini.onclick=()=>{currentPalette=[...p];renderPalette()};
    div.appendChild(mini);
  });
}

generate();
renderSaved();

let audioCtx,musicOn=false;
function toggleMusic(){
  const btn=document.querySelector('.music-toggle');
  if(!musicOn){audioCtx=new(window.AudioContext||window.webkitAudioContext)();playColors();musicOn=true;btn.textContent='🔊'}
  else{audioCtx.close();audioCtx=null;musicOn=false;btn.textContent='🔇'}
}
function playColors(){
  if(!audioCtx)return;
  const now=audioCtx.currentTime;
  const pentatonic=[261.63,293.66,329.63,392,440,523.25];
  for(let i=0;i<4;i++){
    const f=pentatonic[Math.floor(Math.random()*pentatonic.length)];
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='sine';o.frequency.value=f;
    g.gain.setValueAtTime(0,now+i*1.5);g.gain.linearRampToValueAtTime(.035,now+i*1.5+.2);g.gain.linearRampToValueAtTime(0,now+i*1.5+1.4);
    o.connect(g);g.connect(audioCtx.destination);o.start(now+i*1.5);o.stop(now+i*1.5+1.5);
  }
  setTimeout(playColors,6000);
}
document.addEventListener('click',function s(){if(!musicOn)toggleMusic();document.removeEventListener('click',s)},{once:true});
</script>
</body>
</html>
