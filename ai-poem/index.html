<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎭 AI Poem Generator</title>
<meta name="description" content="Enter a word or a feeling and watch AI craft a beautiful poem with ambient visuals.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400&display=swap');
body{font-family:'Inter',sans-serif;min-height:100vh;background:#0a0a14;color:#e0d5c7;overflow-x:hidden;display:flex;align-items:center;justify-content:center}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
.container{position:relative;z-index:1;max-width:650px;width:90%;text-align:center;padding:2rem}
h1{font-family:'Cormorant Garamond',serif;font-size:clamp(2.5rem,8vw,5rem);font-weight:600;color:#d4a574;margin-bottom:.5rem}
.sub{color:#8b7355;font-size:.95rem;letter-spacing:3px;margin-bottom:2rem;text-transform:uppercase}
.moods{display:flex;flex-wrap:wrap;gap:.6rem;justify-content:center;margin-bottom:1.5rem}
.mood{padding:.6rem 1.2rem;border-radius:99px;border:1.5px solid #d4a57433;background:transparent;color:#d4a574;cursor:pointer;font-family:'Inter',sans-serif;font-size:.85rem;transition:all .3s}
.mood:hover{border-color:#d4a574;background:#d4a57411}
.mood.active{background:#d4a57422;border-color:#d4a574;box-shadow:0 0 20px #d4a57433}
input{width:100%;padding:1.2rem 1.5rem;border-radius:16px;border:2px solid #d4a57433;background:#12121e;color:#e0d5c7;font-size:1rem;font-family:'Inter',sans-serif;outline:none;transition:all .3s;margin-bottom:1.5rem}
input:focus{border-color:#d4a574;box-shadow:0 0 25px #d4a57422}
input::placeholder{color:#555}
.gen-btn{width:100%;padding:1.1rem;border:none;border-radius:16px;background:linear-gradient(135deg,#d4a574,#8b5e3c);color:#fff;font-size:1.1rem;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .3s;letter-spacing:2px;text-transform:uppercase}
.gen-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px #d4a57444}
.poem-output{margin-top:2rem;padding:2.5rem;border-radius:20px;background:rgba(18,18,30,0.9);border:1px solid #d4a57422;font-family:'Cormorant Garamond',serif;font-size:1.4rem;line-height:2.2;color:#e0d5c7;font-style:italic;display:none;text-align:left;position:relative}
.poem-output.visible{display:block;animation:fadeUp .8s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.poem-output::before{content:'❝';position:absolute;top:10px;left:15px;font-size:3rem;color:#d4a57433;font-style:normal}
.music-toggle{position:fixed;top:1.5rem;right:1.5rem;z-index:100;background:#12121e;border:2px solid #d4a57444;border-radius:50%;width:50px;height:50px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.3rem;transition:all .3s}
.music-toggle:hover{border-color:#d4a574;transform:scale(1.1)}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="music-toggle" onclick="toggleMusic()">🔊</div>
<div class="container">
  <h1>Poem Forge</h1>
  <p class="sub">Words become art</p>
  <div class="moods">
    <span class="mood active" data-mood="melancholy" onclick="setMood(this)">🌧️ Melancholy</span>
    <span class="mood" data-mood="joy" onclick="setMood(this)">☀️ Joy</span>
    <span class="mood" data-mood="love" onclick="setMood(this)">💕 Love</span>
    <span class="mood" data-mood="nature" onclick="setMood(this)">🌿 Nature</span>
    <span class="mood" data-mood="cosmic" onclick="setMood(this)">🌌 Cosmic</span>
  </div>
  <input type="text" id="word" placeholder="Enter a word, feeling, or idea..." autofocus>
  <button class="gen-btn" onclick="genPoem()">✒️ Craft Poem</button>
  <div class="poem-output" id="output"></div>
</div>
<script>
const canvas=document.getElementById('bg'),ctx=canvas.getContext('2d');
let dots=[];
function resize(){canvas.width=innerWidth;canvas.height=innerHeight}
resize();window.addEventListener('resize',resize);
for(let i=0;i<100;i++) dots.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*2+.5,a:Math.random()*Math.PI*2,speed:Math.random()*.3+.05});
function animate(){
  ctx.fillStyle='rgba(10,10,20,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);
  dots.forEach(d=>{d.a+=.01;d.x+=Math.cos(d.a)*d.speed;d.y+=Math.sin(d.a)*d.speed;
    if(d.x<0)d.x=canvas.width;if(d.x>canvas.width)d.x=0;if(d.y<0)d.y=canvas.height;if(d.y>canvas.height)d.y=0;
    ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2);ctx.fillStyle='rgba(212,165,116,0.3)';ctx.fill()});
  requestAnimationFrame(animate);
}
animate();
let mood='melancholy';
function setMood(el){document.querySelectorAll('.mood').forEach(m=>m.classList.remove('active'));el.classList.add('active');mood=el.dataset.mood}
const poems={
  melancholy:[
    "The rain outside my window speaks\nof things I cannot name—\na language older than the earth,\na soft, forgiving flame.\n\nI hold {word} close against my chest\nlike letters never sent,\nand wonder if the sky still grieves\nfor all the light it spent.",
    "There is a room inside my heart\nwhere {word} still remains,\na quiet guest who never leaves\nbut never quite explains\n\nwhy some things hurt like memories\nof songs we used to know—\nhalf-forgotten, half-alive,\ntoo beautiful to let go.",
  ],
  joy:[
    "Today I laughed so hard the sun\nlooked down and laughed along,\nand {word} became the chorus of\na bright, unwritten song.\n\nThe flowers tilted toward the sound,\nthe birds forgot their tune,\nand joy, that reckless, golden child,\ncame dancing through the room.",
    "I found {word} hiding in the light\nthat pools on kitchen floors,\nin Tuesday mornings, buttered toast,\nand half-unlocked doors.\n\nJoy is not a thunderclap—\nit's quiet, warm, and slow.\nIt's knowing that this moment here\nis all you need to glow.",
  ],
  love:[
    "I did not fall in love with you\nthe way the poets say—\nno thunderbolt, no sweeping tide,\nno grand romantic play.\n\nI fell the way {word} becomes\na part of someone's name—\nslowly, then all at once,\nuntil nothing felt the same.",
    "You are {word} and morning light,\nyou are the space between\nthe heartbeat and the breath that follows—\nquiet, soft, unseen.\n\nI loved you before I knew\nwhat loving meant to do.\nNow every poem I write\nsomehow leads back to you.",
  ],
  nature:[
    "The forest holds its breath at dawn\nwhen {word} drifts through the trees,\na secret passed from root to root\ncarried by the breeze.\n\nThe river writes in cursive script\nacross the mossy stone,\nand every leaf becomes a page\nin a book the earth has grown.",
    "I pressed {word} between the pages\nof an autumn afternoon,\nwhere golden light met amber shade\nbeneath a harvest moon.\n\nThe hills remember everything—\neach footstep, every rain.\nThey hold the weight of centuries\nand whisper it again.",
  ],
  cosmic:[
    "We are stardust, you and I—\nborn from {word} and light,\nspun from galaxies that danced\nacross the endless night.\n\nThe universe expands because\nit cannot hold its awe\nat all the tiny, brilliant things\nthat no one ever saw.",
    "Between the stars, {word} drifts\nlike a question without end,\na signal from a dying sun\nthat time could never mend.\n\nWe are the universe's way\nof knowing it exists—\ntwo atoms in the cosmic dark,\ntwo names upon its lists.",
  ]
};
function genPoem(){
  const word=document.getElementById('word').value.trim()||'silence';
  const pool=poems[mood];
  let poem=pool[Math.floor(Math.random()*pool.length)].replace(/{word}/g,word);
  const out=document.getElementById('output');
  out.innerHTML='';out.classList.remove('visible');
  setTimeout(()=>{out.textContent=poem;out.classList.add('visible')},300);
}
document.getElementById('word').addEventListener('keydown',e=>{if(e.key==='Enter')genPoem()});

let audioCtx,musicOn=false;
function toggleMusic(){
  const btn=document.querySelector('.music-toggle');
  if(!musicOn){audioCtx=new(window.AudioContext||window.webkitAudioContext)();playPiano();musicOn=true;btn.textContent='🔊'}
  else{audioCtx.close();audioCtx=null;musicOn=false;btn.textContent='🔇'}
}
function playPiano(){
  if(!audioCtx)return;
  const now=audioCtx.currentTime;
  const notes=[261.63,329.63,392,523.25,440,349.23,293.66,261.63];
  notes.forEach((f,i)=>{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='sine';o.frequency.value=f;
    g.gain.setValueAtTime(0,now+i*1);g.gain.linearRampToValueAtTime(.05,now+i*1+.1);g.gain.exponentialRampToValueAtTime(.001,now+i*1+.9);
    o.connect(g);g.connect(audioCtx.destination);o.start(now+i*1);o.stop(now+i*1+1);
  });
  setTimeout(playPiano,8000);
}
document.addEventListener('click',function s(){if(!musicOn)toggleMusic();document.removeEventListener('click',s)},{once:true});
</script>
</body>
</html>
