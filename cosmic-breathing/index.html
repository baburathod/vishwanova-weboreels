<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌌 Cosmic Breathing</title>
<meta name="description" content="A guided breathing exercise with cosmic visuals. Breathe in, hold, breathe out.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap');
body{font-family:'Outfit',sans-serif;min-height:100vh;background:#050510;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}
.container{position:relative;z-index:1;text-align:center}
.breath-circle{width:250px;height:250px;border-radius:50%;border:2px solid #a78bfa33;margin:0 auto 2rem;display:flex;align-items:center;justify-content:center;position:relative;transition:transform 4s ease-in-out,border-color 4s}
.breath-circle.inhale{transform:scale(1.5);border-color:#22c55e}
.breath-circle.hold{transform:scale(1.5);border-color:#fbbf24}
.breath-circle.exhale{transform:scale(1);border-color:#06b6d4}
.inner-glow{width:150px;height:150px;border-radius:50%;background:radial-gradient(circle,#a78bfa22,transparent);transition:all 4s;position:absolute}
.breath-circle.inhale .inner-glow{width:200px;height:200px;background:radial-gradient(circle,#22c55e33,transparent)}
.breath-circle.hold .inner-glow{width:200px;height:200px;background:radial-gradient(circle,#fbbf2433,transparent)}
.breath-circle.exhale .inner-glow{width:100px;height:100px;background:radial-gradient(circle,#06b6d422,transparent)}
.breath-text{font-size:1.5rem;font-weight:500;letter-spacing:5px;z-index:1;transition:color 4s}
.instruction{font-size:clamp(1.5rem,5vw,3rem);font-weight:700;margin-bottom:.5rem;letter-spacing:3px;transition:color 1s}
.counter{font-size:3rem;font-weight:300;color:#666;margin-bottom:1rem}
.patterns{display:flex;gap:.5rem;margin-bottom:2rem;flex-wrap:wrap;justify-content:center}
.pattern{padding:.5rem 1rem;border-radius:99px;border:1.5px solid #a78bfa33;background:transparent;color:#a78bfa88;cursor:pointer;font-family:'Outfit',sans-serif;font-size:.85rem;transition:all .3s}
.pattern:hover{border-color:#a78bfa}
.pattern.active{background:#a78bfa22;border-color:#a78bfa;color:#a78bfa}
.start-btn{padding:1rem 3rem;border-radius:16px;border:none;background:linear-gradient(135deg,#a78bfa,#06b6d4);color:#fff;font-family:'Outfit',sans-serif;font-size:1.1rem;font-weight:700;cursor:pointer;transition:all .3s;letter-spacing:2px}
.start-btn:hover{transform:translateY(-3px);box-shadow:0 8px 30px #a78bfa44}
.session-info{margin-top:1.5rem;font-size:.85rem;color:#555}
.music-toggle{position:fixed;top:1.5rem;right:1.5rem;z-index:100;background:rgba(5,5,16,0.7);border:2px solid #a78bfa44;border-radius:50%;width:50px;height:50px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.3rem;transition:all .3s}
.music-toggle:hover{border-color:#a78bfa;transform:scale(1.1)}
</style>
</head>
<body>
<canvas id="cosmos"></canvas>
<div class="music-toggle" onclick="toggleMusic()">🔊</div>
<div class="container">
  <div class="patterns">
    <span class="pattern active" data-p="4-4-4" onclick="setPattern(this,4,4,4)">4-4-4 Calm</span>
    <span class="pattern" data-p="4-7-8" onclick="setPattern(this,4,7,8)">4-7-8 Sleep</span>
    <span class="pattern" data-p="5-5-5" onclick="setPattern(this,5,5,5)">5-5-5 Focus</span>
    <span class="pattern" data-p="6-2-6" onclick="setPattern(this,6,2,6)">6-2-6 Energy</span>
  </div>
  <div class="breath-circle" id="circle">
    <div class="inner-glow"></div>
    <span class="breath-text" id="breathText">Ready</span>
  </div>
  <div class="instruction" id="instruction">Press Start</div>
  <div class="counter" id="counter"></div>
  <button class="start-btn" id="startBtn" onclick="toggleBreathing()">🫁 Start Breathing</button>
  <div class="session-info" id="sessionInfo">Cycles: 0 | Total breaths today: <span id="totalBreaths">0</span></div>
</div>

<script>
const canvas=document.getElementById('cosmos'),ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}
resize();window.addEventListener('resize',resize);

let nebulae=[];
for(let i=0;i<15;i++) nebulae.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*150+50,hue:Math.random()*60+240,dx:(Math.random()-.5)*.1,dy:(Math.random()-.5)*.1});
let stars=[];
for(let i=0;i<150;i++) stars.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:Math.random()*1.5+.3,twinkle:Math.random()*Math.PI*2});

function drawCosmos(){
  ctx.fillStyle='rgba(5,5,16,0.03)';ctx.fillRect(0,0,W,H);
  nebulae.forEach(n=>{
    n.x+=n.dx;n.y+=n.dy;if(n.x<-200||n.x>W+200)n.dx*=-1;if(n.y<-200||n.y>H+200)n.dy*=-1;
    const g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
    g.addColorStop(0,`hsla(${n.hue},60%,30%,0.02)`);g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);ctx.fill();
  });
  stars.forEach(s=>{s.twinkle+=.01;
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${.2+Math.sin(s.twinkle)*.15})`;ctx.fill()});
  requestAnimationFrame(drawCosmos);
}
drawCosmos();

let inhaleTime=4,holdTime=4,exhaleTime=4;
let breathing=false,phase='ready',countdown=0,interval=null,cycles=0;
let totalBreaths=parseInt(localStorage.getItem('totalBreaths')||'0');
document.getElementById('totalBreaths').textContent=totalBreaths;

function setPattern(el,i,h,e){
  document.querySelectorAll('.pattern').forEach(p=>p.classList.remove('active'));
  el.classList.add('active');
  inhaleTime=i;holdTime=h;exhaleTime=e;
  if(!breathing){document.getElementById('instruction').textContent='Press Start'}
}

function toggleBreathing(){
  const btn=document.getElementById('startBtn');
  if(breathing){
    breathing=false;clearInterval(interval);
    btn.textContent='🫁 Start Breathing';
    document.getElementById('instruction').textContent='Paused';
    document.getElementById('circle').className='breath-circle';
    document.getElementById('breathText').textContent='Paused';
  } else {
    breathing=true;
    btn.textContent='⏸ Pause';
    startPhase('inhale');
  }
}

function startPhase(newPhase){
  if(!breathing)return;
  phase=newPhase;
  const circle=document.getElementById('circle');
  const text=document.getElementById('breathText');
  const instr=document.getElementById('instruction');

  circle.className='breath-circle '+phase;

  if(phase==='inhale'){
    countdown=inhaleTime;
    text.textContent='Breathe In';
    instr.textContent='INHALE';
    instr.style.color='#22c55e';
    playBreathSound(200,inhaleTime);
  } else if(phase==='hold'){
    countdown=holdTime;
    text.textContent='Hold';
    instr.textContent='HOLD';
    instr.style.color='#fbbf24';
  } else {
    countdown=exhaleTime;
    text.textContent='Breathe Out';
    instr.textContent='EXHALE';
    instr.style.color='#06b6d4';
    playBreathSound(150,exhaleTime);
  }

  clearInterval(interval);
  document.getElementById('counter').textContent=countdown;
  interval=setInterval(()=>{
    countdown--;
    document.getElementById('counter').textContent=countdown;
    if(countdown<=0){
      clearInterval(interval);
      if(phase==='inhale')startPhase('hold');
      else if(phase==='hold')startPhase('exhale');
      else {
        cycles++;
        totalBreaths++;
        localStorage.setItem('totalBreaths',totalBreaths);
        document.getElementById('sessionInfo').innerHTML=`Cycles: ${cycles} | Total breaths today: <span id="totalBreaths">${totalBreaths}</span>`;
        startPhase('inhale');
      }
    }
  },1000);
}

let audioCtx,musicOn=false;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx}
function playBreathSound(freq,dur){
  try{
    const ctx=getAudio();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.type='sine';o.frequency.value=freq;
    g.gain.setValueAtTime(0,ctx.currentTime);g.gain.linearRampToValueAtTime(.03,ctx.currentTime+dur/2);g.gain.linearRampToValueAtTime(0,ctx.currentTime+dur);
    o.connect(g);g.connect(ctx.destination);o.start();o.stop(ctx.currentTime+dur);
  }catch(e){}
}
function toggleMusic(){
  const btn=document.querySelector('.music-toggle');
  if(!musicOn){getAudio();playAmbient();musicOn=true;btn.textContent='🔊'}
  else{audioCtx.close();audioCtx=null;musicOn=false;btn.textContent='🔇'}
}
function playAmbient(){
  if(!audioCtx)return;
  const now=audioCtx.currentTime;
  [130.81,164.81,196,261.63].forEach((f,i)=>{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='sine';o.frequency.value=f;
    g.gain.setValueAtTime(0,now+i*3);g.gain.linearRampToValueAtTime(.025,now+i*3+1);g.gain.linearRampToValueAtTime(0,now+i*3+2.8);
    o.connect(g);g.connect(audioCtx.destination);o.start(now+i*3);o.stop(now+i*3+3);
  });
  setTimeout(playAmbient,12000);
}
document.addEventListener('click',function s(){if(!musicOn)toggleMusic();document.removeEventListener('click',s)},{once:true});
</script>
</body>
</html>
