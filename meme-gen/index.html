<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>😂 Meme Generator Studio</title>
<meta name="description" content="Create custom memes with drag-able text and different templates.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap');
body{font-family:'Outfit',sans-serif;min-height:100vh;background:#0f0f23;color:#fff;overflow-x:hidden}
.container{max-width:700px;margin:0 auto;padding:2rem;text-align:center}
h1{font-size:clamp(2rem,7vw,3.5rem);font-weight:800;background:linear-gradient(135deg,#fbbf24,#f97316,#ef4444);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.5rem}
.sub{color:#fbbf2466;letter-spacing:3px;font-size:.85rem;margin-bottom:2rem;text-transform:uppercase}
.templates{display:flex;gap:.5rem;overflow-x:auto;padding:.5rem 0;margin-bottom:1.5rem;scrollbar-width:none}
.templates::-webkit-scrollbar{display:none}
.tmpl{min-width:80px;height:80px;border-radius:12px;border:2px solid #333;cursor:pointer;transition:all .3s;display:flex;align-items:center;justify-content:center;font-size:2rem;background:#1a1a35}
.tmpl:hover{border-color:#fbbf24}
.tmpl.active{border-color:#fbbf24;box-shadow:0 0 20px #fbbf2433}
.meme-canvas{width:100%;aspect-ratio:1;background:#1a1a35;border-radius:16px;position:relative;overflow:hidden;margin-bottom:1.5rem;border:2px solid #222}
.meme-bg{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:8rem;position:absolute;top:0;left:0;background:#1a1a35}
.meme-text{position:absolute;padding:.5rem 1rem;font-size:clamp(1.2rem,4vw,2rem);font-weight:800;color:#fff;text-shadow:2px 2px 0 #000,-2px -2px 0 #000,2px -2px 0 #000,-2px 2px 0 #000;text-transform:uppercase;cursor:grab;user-select:none;text-align:center;min-width:50px}
.meme-text:active{cursor:grabbing}
.controls{display:flex;flex-direction:column;gap:1rem}
.input-row{display:flex;gap:.5rem}
.input-row input{flex:1;padding:.8rem 1rem;border-radius:12px;border:2px solid #333;background:#1a1a35;color:#fff;font-family:'Outfit',sans-serif;font-size:.95rem;outline:none;transition:all .3s}
.input-row input:focus{border-color:#fbbf24}
.btn-row{display:flex;gap:.5rem}
.btn{flex:1;padding:.8rem;border-radius:12px;border:none;font-family:'Outfit',sans-serif;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .3s;text-transform:uppercase;letter-spacing:1px}
.btn-primary{background:linear-gradient(135deg,#fbbf24,#f97316);color:#000}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 5px 20px #fbbf2444}
.btn-secondary{background:#1a1a35;color:#fbbf24;border:2px solid #fbbf2433}
.btn-secondary:hover{border-color:#fbbf24}
.music-toggle{position:fixed;top:1.5rem;right:1.5rem;z-index:100;background:#1a1a35;border:2px solid #fbbf2444;border-radius:50%;width:50px;height:50px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.3rem;transition:all .3s}
.music-toggle:hover{border-color:#fbbf24;transform:scale(1.1)}
</style>
</head>
<body>
<div class="music-toggle" onclick="toggleMusic()">🔊</div>
<div class="container">
  <h1>Meme Studio</h1>
  <p class="sub">Create. Laugh. Share.</p>

  <div class="templates" id="templates"></div>

  <div class="meme-canvas" id="canvas">
    <div class="meme-bg" id="memeBg">🐶</div>
    <div class="meme-text" id="topText" style="top:5%;left:50%;transform:translateX(-50%)">TOP TEXT</div>
    <div class="meme-text" id="bottomText" style="bottom:5%;left:50%;transform:translateX(-50%)">BOTTOM TEXT</div>
  </div>

  <div class="controls">
    <div class="input-row">
      <input type="text" id="topInput" placeholder="Top text..." oninput="document.getElementById('topText').textContent=this.value||'TOP TEXT'">
      <input type="text" id="bottomInput" placeholder="Bottom text..." oninput="document.getElementById('bottomText').textContent=this.value||'BOTTOM TEXT'">
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="randomMeme()">🎲 Random</button>
      <button class="btn btn-secondary" onclick="downloadMeme()">📥 Download</button>
    </div>
  </div>
</div>

<script>
const templates=[
  {emoji:'🐶',bg:'#2d1810',name:'Doge'},
  {emoji:'🤔',bg:'#1a1a35',name:'Thinking'},
  {emoji:'💀',bg:'#0a0a0a',name:'Skull'},
  {emoji:'🔥',bg:'#1a0a0a',name:'Fire'},
  {emoji:'😤',bg:'#1a1a05',name:'Angry'},
  {emoji:'🤡',bg:'#1a0528',name:'Clown'},
  {emoji:'👽',bg:'#051a10',name:'Alien'},
  {emoji:'🧠',bg:'#190a2e',name:'Brain'},
  {emoji:'🐸',bg:'#0a1a0a',name:'Frog'},
  {emoji:'😎',bg:'#1a1005',name:'Cool'},
  {emoji:'🦄',bg:'#1a0a22',name:'Unicorn'},
  {emoji:'🚀',bg:'#050a1a',name:'Rocket'},
];

const tmplContainer=document.getElementById('templates');
templates.forEach((t,i)=>{
  const el=document.createElement('div');
  el.className='tmpl'+(i===0?' active':'');
  el.textContent=t.emoji;
  el.style.background=t.bg;
  el.onclick=()=>{
    document.querySelectorAll('.tmpl').forEach(x=>x.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('memeBg').textContent=t.emoji;
    document.getElementById('memeBg').style.background=t.bg;
  };
  tmplContainer.appendChild(el);
});

// Draggable text
function makeDraggable(el){
  let isDragging=false,startX,startY,origX,origY;
  el.addEventListener('mousedown',e=>{isDragging=true;startX=e.clientX;startY=e.clientY;const r=el.getBoundingClientRect();origX=r.left;origY=r.top;el.style.transform='none';e.preventDefault()});
  el.addEventListener('touchstart',e=>{isDragging=true;startX=e.touches[0].clientX;startY=e.touches[0].clientY;const r=el.getBoundingClientRect();origX=r.left;origY=r.top;el.style.transform='none';e.preventDefault()});
  document.addEventListener('mousemove',e=>{if(!isDragging)return;const parent=document.getElementById('canvas').getBoundingClientRect();el.style.left=((origX-parent.left)+(e.clientX-startX))+'px';el.style.top=((origY-parent.top)+(e.clientY-startY))+'px'});
  document.addEventListener('touchmove',e=>{if(!isDragging)return;const parent=document.getElementById('canvas').getBoundingClientRect();el.style.left=((origX-parent.left)+(e.touches[0].clientX-startX))+'px';el.style.top=((origY-parent.top)+(e.touches[0].clientY-startY))+'px'});
  document.addEventListener('mouseup',()=>isDragging=false);
  document.addEventListener('touchend',()=>isDragging=false);
}
makeDraggable(document.getElementById('topText'));
makeDraggable(document.getElementById('bottomText'));

const randomTexts={
  top:["WHEN YOU","ME EXPLAINING","NOBODY:","POV:","THAT MOMENT WHEN","TEACHER:","MY BRAIN AT 3AM","WHEN THE WIFI","MOM: WE HAVE","FRIEND:"],
  bottom:["ABSOLUTELY NOT","...ANYWAY","UNDERSTANDABLE","IT'S FINE","HELP","THIS IS FINE","I'M IN DANGER","BOTTOM TEXT","SEND HELP","PAIN"]
};

function randomMeme(){
  const t=randomTexts.top[Math.floor(Math.random()*randomTexts.top.length)];
  const b=randomTexts.bottom[Math.floor(Math.random()*randomTexts.bottom.length)];
  const tmpl=templates[Math.floor(Math.random()*templates.length)];
  document.getElementById('topText').textContent=t;
  document.getElementById('bottomText').textContent=b;
  document.getElementById('topInput').value=t;
  document.getElementById('bottomInput').value=b;
  document.getElementById('memeBg').textContent=tmpl.emoji;
  document.getElementById('memeBg').style.background=tmpl.bg;
}

function downloadMeme(){
  const c=document.createElement('canvas');c.width=600;c.height=600;
  const ctx=c.getContext('2d');
  ctx.fillStyle='#1a1a35';ctx.fillRect(0,0,600,600);
  ctx.font='200px serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(document.getElementById('memeBg').textContent,300,300);
  ctx.font='bold 36px Outfit,sans-serif';ctx.fillStyle='#fff';ctx.strokeStyle='#000';ctx.lineWidth=4;ctx.textAlign='center';
  const top=document.getElementById('topText').textContent;
  const bottom=document.getElementById('bottomText').textContent;
  ctx.strokeText(top,300,50);ctx.fillText(top,300,50);
  ctx.strokeText(bottom,300,570);ctx.fillText(bottom,300,570);
  const link=document.createElement('a');link.download='meme.png';link.href=c.toDataURL();link.click();
}

let audioCtx,musicOn=false;
function toggleMusic(){
  const btn=document.querySelector('.music-toggle');
  if(!musicOn){audioCtx=new(window.AudioContext||window.webkitAudioContext)();playFunky();musicOn=true;btn.textContent='🔊'}
  else{audioCtx.close();audioCtx=null;musicOn=false;btn.textContent='🔇'}
}
function playFunky(){
  if(!audioCtx)return;
  const now=audioCtx.currentTime;
  const notes=[196,220,261.63,293.66,329.63,293.66,261.63,220];
  notes.forEach((f,i)=>{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='square';o.frequency.value=f;
    g.gain.setValueAtTime(0,now+i*.25);g.gain.linearRampToValueAtTime(.03,now+i*.25+.05);g.gain.linearRampToValueAtTime(0,now+i*.25+.22);
    o.connect(g);g.connect(audioCtx.destination);o.start(now+i*.25);o.stop(now+i*.25+.25);
  });
  setTimeout(playFunky,2000);
}
document.addEventListener('click',function s(){if(!musicOn)toggleMusic();document.removeEventListener('click',s)},{once:true});
</script>
</body>
</html>
