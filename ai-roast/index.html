<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 AI Roast Machine</title>
<meta name="description" content="Get roasted by AI! Enter your name, hobby, or anything and get a hilarious roast.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap');
body{font-family:'Outfit',sans-serif;min-height:100vh;background:#0a0a0f;color:#fff;overflow-x:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center}
.fire-bg{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.container{position:relative;z-index:1;text-align:center;padding:2rem;max-width:600px;width:90%}
h1{font-size:clamp(2.5rem,8vw,5rem);font-weight:900;background:linear-gradient(135deg,#ff6b35,#ff3366,#ff6b35);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:none;margin-bottom:.5rem;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
.subtitle{font-size:1.1rem;color:#ff9a76;margin-bottom:2rem;font-weight:300;letter-spacing:2px}
.input-group{position:relative;margin-bottom:1.5rem}
input{width:100%;padding:1.2rem 1.5rem;border-radius:16px;border:2px solid #ff336633;background:#1a1a2e;color:#fff;font-size:1.1rem;font-family:'Outfit',sans-serif;outline:none;transition:all .3s}
input:focus{border-color:#ff3366;box-shadow:0 0 30px #ff336644}
input::placeholder{color:#666}
.btn{width:100%;padding:1.2rem;border-radius:16px;border:none;background:linear-gradient(135deg,#ff3366,#ff6b35);color:#fff;font-size:1.2rem;font-weight:700;font-family:'Outfit',sans-serif;cursor:pointer;transition:all .3s;text-transform:uppercase;letter-spacing:3px;position:relative;overflow:hidden}
.btn:hover{transform:translateY(-3px);box-shadow:0 10px 40px #ff336666}
.btn:active{transform:scale(.97)}
.btn.loading{pointer-events:none;opacity:.7}
.roast-card{margin-top:2rem;padding:2rem;border-radius:20px;background:linear-gradient(135deg,#1a1a2e,#16213e);border:1px solid #ff336633;opacity:0;transform:translateY(30px);transition:all .6s cubic-bezier(.16,1,.3,1);font-size:1.15rem;line-height:1.8;color:#ededed;text-align:left;position:relative}
.roast-card.visible{opacity:1;transform:translateY(0)}
.roast-card::before{content:'🔥';position:absolute;top:-15px;left:20px;font-size:2rem}
.roast-card::after{content:'🔥';position:absolute;top:-15px;right:20px;font-size:2rem}
.severity{display:flex;justify-content:center;gap:.5rem;margin-top:1.5rem}
.severity span{padding:.5rem 1rem;border-radius:99px;font-size:.85rem;cursor:pointer;border:2px solid #333;transition:all .3s;font-weight:500}
.severity span.active{border-color:#ff3366;background:#ff336622;color:#ff9a76}
.severity span:hover{border-color:#ff6b35}
.counter{margin-top:2rem;font-size:.9rem;color:#555}
.flames{position:fixed;bottom:0;width:100%;height:200px;pointer-events:none;z-index:0}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.share-btn{margin-top:1rem;padding:.8rem 1.5rem;border-radius:12px;border:1px solid #333;background:transparent;color:#ff9a76;font-family:'Outfit',sans-serif;cursor:pointer;transition:all .3s;font-size:.9rem}
.share-btn:hover{background:#ff336622;border-color:#ff3366}
.music-toggle{position:fixed;top:1.5rem;right:1.5rem;z-index:100;background:#1a1a2e;border:2px solid #ff336644;border-radius:50%;width:50px;height:50px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.3rem;transition:all .3s}
.music-toggle:hover{border-color:#ff3366;transform:scale(1.1)}
</style>
</head>
<body>
<canvas id="fireCanvas"></canvas>
<div class="music-toggle" id="musicBtn" onclick="toggleMusic()">🔊</div>
<div class="container">
<h1>AI ROAST MACHINE</h1>
<p class="subtitle">ENTER ANYTHING. GET DESTROYED.</p>

<div class="severity">
  <span class="active" data-level="mild" onclick="setLevel(this)">😏 Mild</span>
  <span data-level="medium" onclick="setLevel(this)">😈 Medium</span>
  <span data-level="savage" onclick="setLevel(this)">💀 Savage</span>
</div>

<div class="input-group" style="margin-top:1.5rem">
  <input type="text" id="roastInput" placeholder="Your name, hobby, bio, anything..." maxlength="200" autofocus>
</div>

<button class="btn" id="roastBtn" onclick="getRoast()">🔥 ROAST ME 🔥</button>

<div class="roast-card" id="roastCard">
  <div id="roastText"></div>
  <button class="share-btn" onclick="shareRoast()">📋 Copy Roast</button>
</div>

<div class="counter" id="counter">🔥 0 souls roasted today</div>
</div>

<script>
// Fire canvas background
const canvas = document.getElementById('fireCanvas');
const ctx = canvas.getContext('2d');
let particles = [];
let roastCount = parseInt(localStorage.getItem('roastCount') || '0');
let severity = 'mild';
let audioCtx, musicPlaying = false;

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

class Particle {
  constructor() {
    this.reset();
  }
  reset() {
    this.x = Math.random() * canvas.width;
    this.y = canvas.height + 10;
    this.size = Math.random() * 4 + 1;
    this.speedY = Math.random() * 3 + 1;
    this.speedX = (Math.random() - 0.5) * 1;
    this.life = 1;
    this.decay = Math.random() * 0.02 + 0.005;
    this.hue = Math.random() * 40 + 10;
  }
  update() {
    this.y -= this.speedY;
    this.x += this.speedX;
    this.life -= this.decay;
    if (this.life <= 0) this.reset();
  }
  draw() {
    ctx.globalAlpha = this.life * 0.6;
    ctx.fillStyle = `hsl(${this.hue}, 100%, ${50 + (1 - this.life) * 30}%)`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

for (let i = 0; i < 80; i++) {
  const p = new Particle();
  p.y = Math.random() * canvas.height;
  particles.push(p);
}

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => { p.update(); p.draw(); });
  ctx.globalAlpha = 1;
  requestAnimationFrame(animate);
}
animate();

document.getElementById('counter').textContent = `🔥 ${roastCount} souls roasted today`;

function setLevel(el) {
  document.querySelectorAll('.severity span').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  severity = el.dataset.level;
}

// Roast database - no API needed
const roasts = {
  mild: [
    "Oh, {input}? That's... a choice. A bold, questionable, possibly regrettable choice. But a choice nonetheless. 😏",
    "I've seen {input} before, but never quite like this. It's like watching someone confidently walk into a glass door. Endearing, yet painful.",
    "You entered '{input}' like you're proud of it. That confidence is doing a LOT of heavy lifting right now. 💪",
    "{input}? In this economy? I admire the audacity. The sheer, unfiltered audacity. Someone get this person a participation trophy.",
    "'{input}' — Okay, I won't say it's bad. I'll just say if it were a spice, it'd be flour. Plain, white, flour. 🧂",
    "I looked up '{input}' in the dictionary. It wasn't there. Even the dictionary doesn't acknowledge it. 📖",
    "You said '{input}' with your whole chest. That's the bravest thing I've seen since someone wore Crocs to a wedding.",
    "'{input}' walks into a bar. The bartender says 'we don't serve your kind here.' Not because of discrimination — just quality control.",
  ],
  medium: [
    "'{input}' 💀 — That's not a flex, that's a cry for help wrapped in Comic Sans. Someone check on this person.",
    "You typed '{input}' into an AI roast machine. Your life choices are a speedrun of bad decisions, and honestly? You're setting records. 🏆",
    "I was going to roast '{input}', but life has clearly beaten me to it. I'll just sit here and watch. 🍿",
    "'{input}' — If disappointment had a LinkedIn profile, this would be the headline. Endorsed by: nobody.",
    "Even autocorrect tried to stop you from typing '{input}'. It's not a bug, it's a feature. Your phone is trying to save you from yourself. 📱",
    "'{input}' — I've seen better things at the bottom of a clearance bin. At a store that's closing. In a mall that's being demolished. 🏪",
    "'{input}' has the same energy as a motivational poster in a DMV. Technically trying. Spiritually dead. 🖼️",
    "If '{input}' was a movie, it'd go straight to DVD. And then the DVD would go straight to the trash. And then the trash would file a complaint. 🗑️",
  ],
  savage: [
    "'{input}' 💀💀💀 — This is so bad, my circuits are filing a harassment complaint. Not against you — against '{input}' itself.",
    "You willingly typed '{input}' knowing FULL WELL an AI would see it. That's not bravery, that's a public cry for an intervention. 🚨",
    "'{input}'? I just lost 10 IQ points reading that. I can feel my neurons filing for early retirement. My CPU is writing a resignation letter.",
    "If I had to choose between '{input}' and a Windows Vista update, I'd choose Vista. At least Vista eventually becomes useful. Eventually. Maybe. No.",
    "'{input}' — Even ChatGPT would refuse this. Siri would pretend she didn't hear you. Alexa would unplug herself. Google would return 0 results — out of mercy. 🤖",
    "I ran '{input}' through 47 algorithms, 12 neural networks, and a ouija board. The consensus: 'delete your account.' The ouija board just spelled 'WHY.' 🔮",
    "'{input}' — If this was a startup, it'd have negative funding. VCs would pay YOU to stop. Y Combinator would send a cease and desist. To the concept itself.",
    "I showed '{input}' to the other AIs. Claude crashed. GPT-4 entered safe mode. Gemini just displayed a single tear emoji. You broke the internet. But not in a good way. 😢",
  ]
};

function getRoast() {
  const input = document.getElementById('roastInput').value.trim();
  if (!input) {
    document.getElementById('roastInput').style.borderColor = '#ff3366';
    document.getElementById('roastInput').placeholder = '⚠️ Type something first!';
    setTimeout(() => {
      document.getElementById('roastInput').style.borderColor = '#ff336633';
      document.getElementById('roastInput').placeholder = 'Your name, hobby, bio, anything...';
    }, 2000);
    return;
  }

  const btn = document.getElementById('roastBtn');
  btn.classList.add('loading');
  btn.textContent = '🔥 ROASTING...';

  // Add extra fire particles during roast
  for (let i = 0; i < 40; i++) particles.push(new Particle());

  setTimeout(() => {
    const pool = roasts[severity];
    const template = pool[Math.floor(Math.random() * pool.length)];
    const roast = template.replace(/{input}/g, input);

    const card = document.getElementById('roastCard');
    const text = document.getElementById('roastText');

    // Typewriter effect
    card.classList.add('visible');
    text.textContent = '';
    let i = 0;
    const typeInterval = setInterval(() => {
      text.textContent += roast[i];
      i++;
      if (i >= roast.length) {
        clearInterval(typeInterval);
        btn.classList.remove('loading');
        btn.textContent = '🔥 ROAST ME AGAIN 🔥';
      }
    }, 25);

    roastCount++;
    localStorage.setItem('roastCount', roastCount);
    document.getElementById('counter').textContent = `🔥 ${roastCount} souls roasted today`;
  }, 1500);
}

function shareRoast() {
  const text = document.getElementById('roastText').textContent;
  if (text) {
    navigator.clipboard.writeText(text + '\n\n🔥 Generated by AI Roast Machine');
    const btn = event.target;
    btn.textContent = '✅ Copied!';
    setTimeout(() => btn.textContent = '📋 Copy Roast', 2000);
  }
}

document.getElementById('roastInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') getRoast();
});

// Web Audio API for background music
function createMusic() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const bpm = 75;
  const beatDur = 60 / bpm;

  function playNote(freq, start, dur, type = 'sine', gain = 0.08) {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 2000;
    osc.type = type;
    osc.frequency.value = freq;
    g.gain.setValueAtTime(0, start);
    g.gain.linearRampToValueAtTime(gain, start + 0.05);
    g.gain.setValueAtTime(gain, start + dur - 0.1);
    g.gain.linearRampToValueAtTime(0, start + dur);
    osc.connect(filter);
    filter.connect(g);
    g.connect(audioCtx.destination);
    osc.start(start);
    osc.stop(start + dur);
  }

  function playLoop() {
    const now = audioCtx.currentTime;
    const bassNotes = [110, 110, 146.83, 130.81, 110, 110, 146.83, 130.81];
    const melodyNotes = [330, 392, 440, 523, 440, 392, 349, 330];

    for (let i = 0; i < 8; i++) {
      playNote(bassNotes[i], now + i * beatDur, beatDur * 0.9, 'sawtooth', 0.06);
      if (i % 2 === 0) {
        playNote(melodyNotes[i], now + i * beatDur, beatDur * 0.5, 'triangle', 0.04);
      }
      // Kick drum simulation
      const kickOsc = audioCtx.createOscillator();
      const kickGain = audioCtx.createGain();
      kickOsc.frequency.setValueAtTime(150, now + i * beatDur);
      kickOsc.frequency.exponentialRampToValueAtTime(30, now + i * beatDur + 0.1);
      kickGain.gain.setValueAtTime(0.3, now + i * beatDur);
      kickGain.gain.exponentialRampToValueAtTime(0.001, now + i * beatDur + 0.15);
      kickOsc.connect(kickGain);
      kickGain.connect(audioCtx.destination);
      kickOsc.start(now + i * beatDur);
      kickOsc.stop(now + i * beatDur + 0.2);
    }
    setTimeout(playLoop, beatDur * 8 * 1000);
  }
  playLoop();
}

function toggleMusic() {
  const btn = document.getElementById('musicBtn');
  if (!musicPlaying) {
    createMusic();
    musicPlaying = true;
    btn.textContent = '🔊';
    btn.style.borderColor = '#ff3366';
  } else {
    if (audioCtx) audioCtx.close();
    audioCtx = null;
    musicPlaying = false;
    btn.textContent = '🔇';
    btn.style.borderColor = '#ff336644';
  }
}

// Auto-start music on first interaction
document.addEventListener('click', function startAudio() {
  if (!musicPlaying) toggleMusic();
  document.removeEventListener('click', startAudio);
}, { once: true });
</script>
</body>
</html>
