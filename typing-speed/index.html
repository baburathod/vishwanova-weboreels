<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⌨️ Speed Typing Challenge</title>
<meta name="description" content="Test your typing speed with this neon-themed typing game. Track WPM and accuracy.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;500;700&display=swap');
body{font-family:'Inter',sans-serif;min-height:100vh;background:#0a0a1a;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;overflow-x:hidden}
h1{font-family:'JetBrains Mono',monospace;font-size:clamp(1.8rem,5vw,3rem);font-weight:700;background:linear-gradient(135deg,#22c55e,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.5rem}
.sub{color:#22c55e44;font-size:.85rem;letter-spacing:3px;margin-bottom:2rem;text-transform:uppercase}
.stats{display:flex;gap:2rem;margin-bottom:2rem;flex-wrap:wrap;justify-content:center}
.stat{text-align:center;padding:.8rem 1.5rem;border-radius:12px;background:#111827;border:1px solid #1e293b}
.stat-val{font-family:'JetBrains Mono',monospace;font-size:1.8rem;font-weight:700;color:#22c55e}
.stat-label{font-size:.7rem;color:#555;text-transform:uppercase;letter-spacing:1px;margin-top:.3rem}
.text-display{max-width:700px;width:100%;padding:2rem;border-radius:16px;background:#111827;border:1px solid #1e293b;font-family:'JetBrains Mono',monospace;font-size:1.2rem;line-height:2;margin-bottom:1.5rem;min-height:100px;user-select:none;position:relative}
.char{transition:color .1s}
.char.correct{color:#22c55e}
.char.incorrect{color:#ef4444;text-decoration:underline}
.char.current{background:#22c55e33;border-radius:2px}
.char.pending{color:#555}
.hidden-input{position:absolute;opacity:0;width:0;height:0}
.modes{display:flex;gap:.5rem;margin-bottom:1.5rem;flex-wrap:wrap;justify-content:center}
.mode{padding:.5rem 1rem;border-radius:99px;border:1.5px solid #22c55e33;background:transparent;color:#22c55e88;cursor:pointer;font-family:'Inter',sans-serif;font-size:.85rem;transition:all .3s}
.mode:hover{border-color:#22c55e}
.mode.active{background:#22c55e22;border-color:#22c55e;color:#22c55e}
.btn{padding:.8rem 2rem;border-radius:12px;border:none;background:linear-gradient(135deg,#22c55e,#06b6d4);color:#000;font-family:'Inter',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all .3s}
.btn:hover{transform:translateY(-2px);box-shadow:0 5px 20px #22c55e44}
.music-toggle{position:fixed;top:1.5rem;right:1.5rem;z-index:100;background:#111827;border:2px solid #22c55e44;border-radius:50%;width:50px;height:50px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.3rem;transition:all .3s}
.music-toggle:hover{border-color:#22c55e;transform:scale(1.1)}
.result-card{display:none;padding:2rem;border-radius:16px;background:#111827;border:1px solid #22c55e33;text-align:center;max-width:400px;width:100%;margin-top:1.5rem}
.result-card.show{display:block;animation:fadeIn .5s ease}
@keyframes fadeIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.result-wpm{font-family:'JetBrains Mono',monospace;font-size:4rem;font-weight:700;color:#22c55e}
.result-label{color:#666;font-size:.9rem;margin-bottom:1rem}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="music-toggle" onclick="toggleMusic()">🔊</div>
<h1>&gt;_ SpeedType</h1>
<p class="sub">How fast can you code?</p>

<div class="modes">
  <span class="mode active" data-mode="words" onclick="setMode(this)">📝 Words</span>
  <span class="mode" data-mode="quotes" onclick="setMode(this)">💬 Quotes</span>
  <span class="mode" data-mode="code" onclick="setMode(this)">💻 Code</span>
  <span class="mode" data-mode="hard" onclick="setMode(this)">🔥 Hard</span>
</div>

<div class="stats">
  <div class="stat"><div class="stat-val" id="wpm">0</div><div class="stat-label">WPM</div></div>
  <div class="stat"><div class="stat-val" id="accuracy">100%</div><div class="stat-label">Accuracy</div></div>
  <div class="stat"><div class="stat-val" id="time">30</div><div class="stat-label">Seconds</div></div>
</div>

<div class="text-display" id="display" onclick="document.getElementById('input').focus()"></div>
<input type="text" class="hidden-input" id="input" autofocus autocomplete="off" autocapitalize="off">
<button class="btn" onclick="startTest()">🔄 Restart</button>

<div class="result-card" id="resultCard">
  <div class="result-wpm" id="finalWpm">0</div>
  <div class="result-label">Words Per Minute</div>
  <div style="color:#aaa;margin-bottom:.5rem" id="finalAcc">100% accuracy</div>
  <button class="btn" onclick="startTest();document.getElementById('resultCard').classList.remove('show')">🔄 Try Again</button>
</div>

<script>
const canvas=document.getElementById('bg'),ctx=canvas.getContext('2d');
function resize(){canvas.width=innerWidth;canvas.height=innerHeight}
resize();window.addEventListener('resize',resize);
let drops=[];
for(let i=0;i<40;i++) drops.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,speed:Math.random()*2+1,char:String.fromCharCode(33+Math.floor(Math.random()*93))});
function drawBg(){
  ctx.fillStyle='rgba(10,10,26,0.05)';ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.font='14px JetBrains Mono';
  drops.forEach(d=>{d.y+=d.speed;if(d.y>canvas.height){d.y=0;d.x=Math.random()*canvas.width;d.char=String.fromCharCode(33+Math.floor(Math.random()*93))}
    ctx.fillStyle='rgba(34,197,94,0.08)';ctx.fillText(d.char,d.x,d.y)});
  requestAnimationFrame(drawBg);
}
drawBg();

const texts={
  words:["the quick brown fox jumps over the lazy dog and then runs across the field toward the rising sun","coding is not just about syntax it is about thinking logically and solving real world problems","practice makes progress every keystroke brings you closer to mastery keep pushing forward","technology evolves but the fundamentals of good code remain clean readable and maintainable"],
  quotes:["the best way to predict the future is to invent it alan kay","any fool can write code that a computer can understand good programmers write code that humans can understand","first solve the problem then write the code john johnson","code is like humor when you have to explain it its bad"],
  code:["function fibonacci(n) { return n <= 1 ? n : fibonacci(n-1) + fibonacci(n-2); }","const result = array.filter(x => x > 0).map(x => x * 2).reduce((a, b) => a + b, 0);","for (let i = 0; i < items.length; i++) { console.log(items[i]); }","const [state, setState] = useState(null); useEffect(() => { fetchData(); }, []);"],
  hard:["xylophone juxtaposition quizzical rhythmically synchronized hypothetically","paradigm asynchronous polymorphism encapsulation abstraction inheritance","bureaucracy onomatopoeia psychologically quintessentially idiosyncratic","algorithm exponentially concatenation authentication middleware"]
};

let mode='words',chars=[],currentIdx=0,started=false,timer=null,timeLeft=30,correct=0,incorrect=0;

function setMode(el){document.querySelectorAll('.mode').forEach(m=>m.classList.remove('active'));el.classList.add('active');mode=el.dataset.mode;startTest()}

function startTest(){
  clearInterval(timer);started=false;timeLeft=30;currentIdx=0;correct=0;incorrect=0;
  document.getElementById('wpm').textContent='0';
  document.getElementById('accuracy').textContent='100%';
  document.getElementById('time').textContent='30';
  document.getElementById('resultCard').classList.remove('show');

  const pool=texts[mode];
  const text=pool[Math.floor(Math.random()*pool.length)];
  chars=text.split('');
  const display=document.getElementById('display');
  display.innerHTML=chars.map((c,i)=>`<span class="char ${i===0?'current':'pending'}" data-i="${i}">${c===' '?'&nbsp;':c}</span>`).join('');
  document.getElementById('input').value='';
  document.getElementById('input').focus();
}

document.getElementById('input').addEventListener('input',function(e){
  if(!started){
    started=true;
    timer=setInterval(()=>{timeLeft--;document.getElementById('time').textContent=timeLeft;
      if(timeLeft<=0){clearInterval(timer);endTest()}
    },1000);
  }

  const val=e.data;
  if(currentIdx>=chars.length)return;

  const charEl=document.querySelector(`.char[data-i="${currentIdx}"]`);
  if(val===chars[currentIdx]){
    charEl.classList.remove('current','pending');charEl.classList.add('correct');correct++;
  } else {
    charEl.classList.remove('current','pending');charEl.classList.add('incorrect');incorrect++;
  }
  currentIdx++;

  if(currentIdx<chars.length){
    document.querySelector(`.char[data-i="${currentIdx}"]`).classList.add('current');
    document.querySelector(`.char[data-i="${currentIdx}"]`).classList.remove('pending');
  }

  // Update stats
  const elapsed=(30-timeLeft)||1;
  const wpm=Math.round((correct/5)/(elapsed/60));
  const acc=Math.round((correct/(correct+incorrect))*100);
  document.getElementById('wpm').textContent=wpm;
  document.getElementById('accuracy').textContent=acc+'%';

  this.value='';

  if(currentIdx>=chars.length){clearInterval(timer);endTest()}
});

function endTest(){
  const elapsed=(30-timeLeft)||1;
  const wpm=Math.round((correct/5)/(elapsed/60));
  const acc=Math.round((correct/(correct+incorrect||1))*100);
  document.getElementById('finalWpm').textContent=wpm;
  document.getElementById('finalAcc').textContent=acc+'% accuracy';
  document.getElementById('resultCard').classList.add('show');
}

let audioCtx,musicOn=false;
function toggleMusic(){
  const btn=document.querySelector('.music-toggle');
  if(!musicOn){audioCtx=new(window.AudioContext||window.webkitAudioContext)();playLoop();musicOn=true;btn.textContent='🔊'}
  else{audioCtx.close();audioCtx=null;musicOn=false;btn.textContent='🔇'}
}
function playLoop(){
  if(!audioCtx)return;
  const now=audioCtx.currentTime;
  [329.63,392,440,523.25,440,392].forEach((f,i)=>{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='sine';o.frequency.value=f;
    g.gain.setValueAtTime(0,now+i*.5);g.gain.linearRampToValueAtTime(.03,now+i*.5+.1);g.gain.linearRampToValueAtTime(0,now+i*.5+.45);
    o.connect(g);g.connect(audioCtx.destination);o.start(now+i*.5);o.stop(now+i*.5+.5);
  });
  setTimeout(playLoop,3000);
}
document.addEventListener('click',function s(){if(!musicOn)toggleMusic();document.removeEventListener('click',s)},{once:true});
startTest();
</script>
</body>
</html>
