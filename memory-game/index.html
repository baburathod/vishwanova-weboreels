<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧠 Memory Card Game</title>
<meta name="description" content="A beautiful neon-themed memory matching card game with scoring and combos.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap');
body{font-family:'Outfit',sans-serif;min-height:100vh;background:#0a0a1a;color:#fff;display:flex;flex-direction:column;align-items:center;padding:1.5rem;overflow-x:hidden}
h1{font-size:clamp(1.8rem,5vw,3rem);font-weight:800;background:linear-gradient(135deg,#a78bfa,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.3rem}
.stats{display:flex;gap:2rem;margin:.8rem 0 1.5rem;font-size:1rem}
.stat{text-align:center}
.stat-val{font-size:1.5rem;font-weight:800;color:#a78bfa}
.stat-label{font-size:.7rem;color:#666;text-transform:uppercase;letter-spacing:1px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.8rem;max-width:450px;width:100%}
@media(max-width:400px){.grid{gap:.5rem}}
.card{aspect-ratio:1;border-radius:16px;cursor:pointer;position:relative;transform-style:preserve-3d;transition:transform .5s;perspective:600px}
.card.flipped{transform:rotateY(180deg)}
.card.matched{transform:rotateY(180deg);pointer-events:none}
.card.matched .card-back{box-shadow:0 0 20px #22c55e55;border-color:#22c55e44}
.card-front,.card-back{position:absolute;inset:0;border-radius:16px;backface-visibility:hidden;display:flex;align-items:center;justify-content:center;border:2px solid #222}
.card-front{background:linear-gradient(135deg,#1a1a35,#13132b);font-size:1.5rem;color:#a78bfa44}
.card-back{background:linear-gradient(135deg,#1a1a35,#0f0f28);transform:rotateY(180deg);font-size:2.5rem;border-color:#a78bfa33}
.btn{margin-top:1.5rem;padding:.8rem 2rem;border-radius:12px;border:none;background:linear-gradient(135deg,#a78bfa,#06b6d4);color:#fff;font-family:'Outfit',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:all .3s;letter-spacing:1px}
.btn:hover{transform:translateY(-2px);box-shadow:0 5px 20px #a78bfa44}
.combo{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:3rem;font-weight:800;color:#fbbf24;pointer-events:none;opacity:0;transition:all .5s;z-index:100;text-shadow:0 0 30px #fbbf2466}
.combo.show{opacity:1;transform:translate(-50%,-60%)}
.music-toggle{position:fixed;top:1rem;right:1rem;z-index:100;background:#1a1a35;border:2px solid #a78bfa44;border-radius:50%;width:45px;height:45px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.2rem;transition:all .3s}
.music-toggle:hover{border-color:#a78bfa;transform:scale(1.1)}
.win-screen{position:fixed;inset:0;background:rgba(10,10,26,.95);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:50;animation:fadeIn .5s ease}
.win-screen.show{display:flex}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.win-screen h2{font-size:3rem;margin-bottom:1rem;background:linear-gradient(135deg,#fbbf24,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.win-stats{font-size:1.2rem;color:#aaa;margin-bottom:2rem;text-align:center;line-height:2}
</style>
</head>
<body>
<div class="music-toggle" onclick="toggleMusic()">🔊</div>
<h1>Memory Match</h1>
<div class="stats">
  <div class="stat"><div class="stat-val" id="moves">0</div><div class="stat-label">Moves</div></div>
  <div class="stat"><div class="stat-val" id="score">0</div><div class="stat-label">Score</div></div>
  <div class="stat"><div class="stat-val" id="timer">0:00</div><div class="stat-label">Time</div></div>
  <div class="stat"><div class="stat-val" id="combo">0x</div><div class="stat-label">Combo</div></div>
</div>
<div class="grid" id="grid"></div>
<button class="btn" onclick="initGame()">🔄 New Game</button>
<div class="combo" id="comboPopup"></div>
<div class="win-screen" id="winScreen">
  <h2>🎉 You Win!</h2>
  <div class="win-stats" id="winStats"></div>
  <button class="btn" onclick="document.getElementById('winScreen').classList.remove('show');initGame()">🔄 Play Again</button>
</div>

<script>
const emojis=['🚀','🎮','🎵','🌈','⚡','🔮','🎯','🌸','🦊','🌙','💎','🎪','🍕','🐙'];
let cards=[],flipped=[],matched=0,moves=0,score=0,comboCount=0,timerInterval,seconds=0,locked=false;

function initGame(){
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  matched=0;moves=0;score=0;comboCount=0;seconds=0;
  document.getElementById('moves').textContent='0';
  document.getElementById('score').textContent='0';
  document.getElementById('combo').textContent='0x';
  document.getElementById('timer').textContent='0:00';
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{seconds++;const m=Math.floor(seconds/60);const s=seconds%60;document.getElementById('timer').textContent=`${m}:${s.toString().padStart(2,'0')}`},1000);

  const selected=emojis.sort(()=>Math.random()-.5).slice(0,8);
  cards=[...selected,...selected].sort(()=>Math.random()-.5);

  cards.forEach((emoji,i)=>{
    const card=document.createElement('div');
    card.className='card';
    card.dataset.emoji=emoji;
    card.dataset.index=i;
    card.innerHTML=`<div class="card-front">?</div><div class="card-back">${emoji}</div>`;
    card.onclick=()=>flipCard(card);
    grid.appendChild(card);
  });
}

function flipCard(card){
  if(locked||card.classList.contains('flipped')||card.classList.contains('matched'))return;
  card.classList.add('flipped');
  flipped.push(card);
  playNote(400+flipped.length*200);

  if(flipped.length===2){
    locked=true;moves++;
    document.getElementById('moves').textContent=moves;

    if(flipped[0].dataset.emoji===flipped[1].dataset.emoji){
      comboCount++;
      const bonus=comboCount*10;
      score+=50+bonus;
      document.getElementById('score').textContent=score;
      document.getElementById('combo').textContent=comboCount+'x';
      flipped.forEach(c=>c.classList.add('matched'));

      if(comboCount>=2){
        const popup=document.getElementById('comboPopup');
        popup.textContent=comboCount>=4?'🔥 INSANE!':comboCount>=3?'⚡ AMAZING!':'✨ COMBO!';
        popup.classList.add('show');
        setTimeout(()=>popup.classList.remove('show'),800);
      }

      playNote(600);setTimeout(()=>playNote(800),150);
      matched+=2;
      if(matched===cards.length){
        clearInterval(timerInterval);
        setTimeout(()=>{
          document.getElementById('winStats').innerHTML=`Score: ${score}<br>Moves: ${moves}<br>Time: ${document.getElementById('timer').textContent}<br>Best Combo: ${comboCount}x`;
          document.getElementById('winScreen').classList.add('show');
        },600);
      }
      flipped=[];locked=false;
    } else {
      comboCount=0;
      document.getElementById('combo').textContent='0x';
      setTimeout(()=>{flipped.forEach(c=>c.classList.remove('flipped'));flipped=[];locked=false},800);
    }
  }
}

let audioCtx,musicOn=false;
function getAudioCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx}
function playNote(freq){
  try{
    const ctx=getAudioCtx();const o=ctx.createOscillator(),g=ctx.createGain();
    o.type='sine';o.frequency.value=freq;g.gain.setValueAtTime(.1,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.3);
    o.connect(g);g.connect(ctx.destination);o.start();o.stop(ctx.currentTime+.3);
  }catch(e){}
}
function toggleMusic(){
  const btn=document.querySelector('.music-toggle');
  if(!musicOn){getAudioCtx();playBGM();musicOn=true;btn.textContent='🔊'}
  else{if(audioCtx){audioCtx.close();audioCtx=null}musicOn=false;btn.textContent='🔇'}
}
function playBGM(){
  if(!audioCtx)return;
  const now=audioCtx.currentTime;
  [196,247,294,330,294,247].forEach((f,i)=>{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='triangle';o.frequency.value=f;
    g.gain.setValueAtTime(0,now+i*.8);g.gain.linearRampToValueAtTime(.025,now+i*.8+.1);g.gain.linearRampToValueAtTime(0,now+i*.8+.7);
    o.connect(g);g.connect(audioCtx.destination);o.start(now+i*.8);o.stop(now+i*.8+.8);
  });
  setTimeout(playBGM,4800);
}
document.addEventListener('click',function s(){if(!musicOn)toggleMusic();document.removeEventListener('click',s)},{once:true});
initGame();
</script>
</body>
</html>
