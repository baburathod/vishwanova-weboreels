<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌍 Interactive World Globe</title>
<meta name="description" content="A 3D interactive world globe with fun facts about countries. Spin, explore, discover.">
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
body{font-family:'Space Grotesk',sans-serif;min-height:100vh;background:#000;color:#fff;overflow:hidden;display:flex;align-items:center;justify-content:center}
canvas{display:block;cursor:grab;position:fixed;top:0;left:0}
canvas:active{cursor:grabbing}
.info-panel{position:fixed;top:50%;right:2rem;transform:translateY(-50%);z-index:10;max-width:300px;padding:1.5rem;border-radius:16px;background:rgba(0,0,0,0.8);border:1px solid #22c55e33;backdrop-filter:blur(10px);transition:all .5s;opacity:0;pointer-events:none}
.info-panel.visible{opacity:1;pointer-events:auto}
.info-flag{font-size:3rem;margin-bottom:.5rem}
.info-name{font-size:1.5rem;font-weight:700;color:#22c55e;margin-bottom:.5rem}
.info-fact{font-size:.9rem;color:#aaa;line-height:1.8}
.title{position:fixed;top:2rem;left:50%;transform:translateX(-50%);z-index:10;text-align:center}
.title h1{font-size:clamp(1.5rem,4vw,2.5rem);font-weight:700;background:linear-gradient(135deg,#22c55e,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.title p{color:#555;font-size:.85rem;margin-top:.3rem;letter-spacing:2px}
.countries{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:.5rem;flex-wrap:wrap;justify-content:center;max-width:90vw}
.country-btn{padding:.5rem 1rem;border-radius:99px;border:1.5px solid #22c55e33;background:rgba(0,0,0,0.5);color:#aaa;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-size:.8rem;transition:all .3s;backdrop-filter:blur(5px)}
.country-btn:hover{border-color:#22c55e;color:#22c55e;transform:translateY(-2px)}
.music-toggle{position:fixed;top:2rem;right:2rem;z-index:100;background:rgba(0,0,0,0.5);border:1.5px solid #22c55e33;border-radius:50%;width:45px;height:45px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.2rem;transition:all .3s;backdrop-filter:blur(5px)}
.music-toggle:hover{border-color:#22c55e;transform:scale(1.1)}
@media(max-width:768px){.info-panel{right:1rem;left:1rem;top:auto;bottom:8rem;transform:none;max-width:none}}
</style>
</head>
<body>
<canvas id="globe"></canvas>
<div class="title"><h1>🌍 World Explorer</h1><p>Click countries to discover</p></div>
<div class="info-panel" id="info">
  <div class="info-flag" id="flag"></div>
  <div class="info-name" id="name"></div>
  <div class="info-fact" id="fact"></div>
</div>
<div class="countries" id="countries"></div>
<div class="music-toggle" onclick="toggleMusic()">🔊</div>

<script>
const canvas=document.getElementById('globe'),ctx=canvas.getContext('2d');
let W,H;
function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}
resize();window.addEventListener('resize',resize);

const countries=[
  {name:"India",flag:"🇮🇳",lat:20.5,lon:78.9,color:"#f97316",facts:["India has 22 official languages and over 19,500 dialects.","The Indian space program costs less than the budget of many Hollywood movies.","Chess was invented in India around the 6th century AD."]},
  {name:"Japan",flag:"🇯🇵",lat:36.2,lon:138.3,color:"#ef4444",facts:["Japan has over 6,800 islands.","There are more pets than children in Japan.","Kit-Kats come in over 300 flavors in Japan, including wasabi and sake."]},
  {name:"Brazil",flag:"🇧🇷",lat:-14.2,lon:-51.9,color:"#22c55e",facts:["Brazil is home to 60% of the Amazon rainforest.","Brazil has won the FIFA World Cup 5 times — more than any other country.","São Paulo has over 12,000 restaurants."]},
  {name:"Egypt",flag:"🇪🇬",lat:26.8,lon:30.8,color:"#fbbf24",facts:["The Great Pyramid was the tallest structure for 3,800 years.","Ancient Egyptians invented toothpaste.","Egypt's Suez Canal connects the Mediterranean Sea to the Red Sea."]},
  {name:"USA",flag:"🇺🇸",lat:37.1,lon:-95.7,color:"#3b82f6",facts:["The US has no official language at the federal level.","Alaska is simultaneously the most northern, western, and eastern US state.","There are more public libraries than McDonald's in the US."]},
  {name:"Australia",flag:"🇦🇺",lat:-25.3,lon:133.8,color:"#06b6d4",facts:["Australia is home to 21 of the world's 25 most venomous snakes.","The Great Barrier Reef can be seen from space.","Kangaroos and emus can't walk backward — that's why they're on the coat of arms."]},
  {name:"France",flag:"🇫🇷",lat:46.2,lon:2.2,color:"#8b5cf6",facts:["France is the most visited country in the world.","French was the official language of England for over 300 years.","France has 12 time zones — more than any other country."]},
  {name:"Iceland",flag:"🇮🇸",lat:64.9,lon:-19.0,color:"#14b8a6",facts:["Iceland has no army, navy, or air force.","There are no mosquitoes in Iceland.","60% of Iceland's population lives in Reykjavik."]},
];

// Render country buttons
const btnsDiv=document.getElementById('countries');
countries.forEach(c=>{
  const btn=document.createElement('span');
  btn.className='country-btn';
  btn.textContent=c.flag+' '+c.name;
  btn.onclick=()=>showCountry(c);
  btnsDiv.appendChild(btn);
});

let rotX=0,rotY=0,autoRotate=true,dragStartX,dragStartY,isDragging=false;
let stars=[];
for(let i=0;i<300;i++) stars.push({x:Math.random()*2-1,y:Math.random()*2-1,z:Math.random(),r:Math.random()*1.5+.5});

canvas.addEventListener('mousedown',e=>{isDragging=true;dragStartX=e.clientX;dragStartY=e.clientY;autoRotate=false});
canvas.addEventListener('mousemove',e=>{if(!isDragging)return;rotY+=(e.clientX-dragStartX)*.005;rotX+=(e.clientY-dragStartY)*.005;rotX=Math.max(-Math.PI/2,Math.min(Math.PI/2,rotX));dragStartX=e.clientX;dragStartY=e.clientY});
canvas.addEventListener('mouseup',()=>{isDragging=false;setTimeout(()=>autoRotate=true,3000)});
canvas.addEventListener('touchstart',e=>{isDragging=true;dragStartX=e.touches[0].clientX;dragStartY=e.touches[0].clientY;autoRotate=false;e.preventDefault()});
canvas.addEventListener('touchmove',e=>{if(!isDragging)return;rotY+=(e.touches[0].clientX-dragStartX)*.005;rotX+=(e.touches[0].clientY-dragStartY)*.005;rotX=Math.max(-Math.PI/2,Math.min(Math.PI/2,rotX));dragStartX=e.touches[0].clientX;dragStartY=e.touches[0].clientY;e.preventDefault()});
canvas.addEventListener('touchend',()=>{isDragging=false;setTimeout(()=>autoRotate=true,3000)});

function showCountry(c){
  const info=document.getElementById('info');
  document.getElementById('flag').textContent=c.flag;
  document.getElementById('name').textContent=c.name;
  document.getElementById('fact').textContent=c.facts[Math.floor(Math.random()*c.facts.length)];
  info.classList.add('visible');
  // Rotate to country
  rotY=(-c.lon*Math.PI/180);
  rotX=(-c.lat*Math.PI/180);
  autoRotate=false;
  setTimeout(()=>autoRotate=true,5000);
}

function latLonTo3D(lat,lon,r){
  const phi=(90-lat)*Math.PI/180;
  const theta=(lon+180)*Math.PI/180;
  return{x:-r*Math.sin(phi)*Math.cos(theta),y:r*Math.cos(phi),z:r*Math.sin(phi)*Math.sin(theta)};
}

function rotatePoint(p){
  // Rotate Y
  let x=p.x*Math.cos(rotY)-p.z*Math.sin(rotY);
  let z=p.x*Math.sin(rotY)+p.z*Math.cos(rotY);
  let y=p.y;
  // Rotate X
  let y2=y*Math.cos(rotX)-z*Math.sin(rotX);
  let z2=y*Math.sin(rotX)+z*Math.cos(rotX);
  return{x,y:y2,z:z2};
}

function draw(){
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);

  if(autoRotate)rotY+=0.003;

  const cx=W/2,cy=H/2;
  const R=Math.min(W,H)*0.3;

  // Stars
  stars.forEach(s=>{ctx.beginPath();ctx.arc(cx+s.x*W/2,cy+s.y*H/2,s.r*s.z,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${s.z*0.5})`;ctx.fill()});

  // Globe body
  const globeGrad=ctx.createRadialGradient(cx-R*0.3,cy-R*0.3,0,cx,cy,R);
  globeGrad.addColorStop(0,'#1a3a2a');globeGrad.addColorStop(0.7,'#0a1a12');globeGrad.addColorStop(1,'#050d08');
  ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fillStyle=globeGrad;ctx.fill();

  // Grid lines
  ctx.strokeStyle='#22c55e11';ctx.lineWidth=1;
  for(let lat=-80;lat<=80;lat+=20){
    ctx.beginPath();
    for(let lon=0;lon<=360;lon+=5){
      const p=latLonTo3D(lat,lon,R);
      const rp=rotatePoint(p);
      if(rp.z<0)continue;
      const sx=cx+rp.x;const sy=cy-rp.y;
      lon===0?ctx.moveTo(sx,sy):ctx.lineTo(sx,sy);
    }
    ctx.stroke();
  }
  for(let lon=0;lon<360;lon+=30){
    ctx.beginPath();
    for(let lat=-90;lat<=90;lat+=5){
      const p=latLonTo3D(lat,lon,R);
      const rp=rotatePoint(p);
      if(rp.z<0)continue;
      const sx=cx+rp.x;const sy=cy-rp.y;
      lat===-90?ctx.moveTo(sx,sy):ctx.lineTo(sx,sy);
    }
    ctx.stroke();
  }

  // Country dots
  countries.forEach(c=>{
    const p=latLonTo3D(c.lat,c.lon,R);
    const rp=rotatePoint(p);
    if(rp.z<0)return; // behind globe
    const sx=cx+rp.x;const sy=cy-rp.y;
    const scale=(rp.z+R)/(2*R);

    // Glow
    ctx.beginPath();ctx.arc(sx,sy,15*scale,0,Math.PI*2);
    const glow=ctx.createRadialGradient(sx,sy,0,sx,sy,15*scale);
    glow.addColorStop(0,c.color+'44');glow.addColorStop(1,'transparent');
    ctx.fillStyle=glow;ctx.fill();

    // Dot
    ctx.beginPath();ctx.arc(sx,sy,5*scale,0,Math.PI*2);
    ctx.fillStyle=c.color;ctx.fill();

    // Label
    ctx.font=`${Math.round(11*scale)}px Space Grotesk`;
    ctx.fillStyle='#fff';ctx.textAlign='center';
    ctx.fillText(c.flag+' '+c.name,sx,sy-12*scale);
  });

  // Atmosphere
  ctx.beginPath();ctx.arc(cx,cy,R+2,0,Math.PI*2);
  ctx.strokeStyle='#22c55e22';ctx.lineWidth=3;ctx.stroke();
  ctx.beginPath();ctx.arc(cx,cy,R+6,0,Math.PI*2);
  ctx.strokeStyle='#22c55e0a';ctx.lineWidth=4;ctx.stroke();

  requestAnimationFrame(draw);
}
draw();

let audioCtx,musicOn=false;
function toggleMusic(){
  const btn=document.querySelector('.music-toggle');
  if(!musicOn){audioCtx=new(window.AudioContext||window.webkitAudioContext)();playSpace();musicOn=true;btn.textContent='🔊'}
  else{audioCtx.close();audioCtx=null;musicOn=false;btn.textContent='🔇'}
}
function playSpace(){
  if(!audioCtx)return;
  const now=audioCtx.currentTime;
  [130.81,196,261.63,329.63,261.63,196].forEach((f,i)=>{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='sine';o.frequency.value=f;
    g.gain.setValueAtTime(0,now+i*1.5);g.gain.linearRampToValueAtTime(.04,now+i*1.5+.5);g.gain.linearRampToValueAtTime(0,now+i*1.5+1.4);
    o.connect(g);g.connect(audioCtx.destination);o.start(now+i*1.5);o.stop(now+i*1.5+1.5);
  });
  setTimeout(playSpace,9000);
}
document.addEventListener('click',function s(){if(!musicOn)toggleMusic();document.removeEventListener('click',s)},{once:true});
</script>
</body>
</html>
